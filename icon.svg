  <circle cx="256" cy="220" r="100" fill="none" stroke="#00C9A7" stroke-width="2" opacity="0.1"/>

  <!-- Double helix stylisée -->
  <!-- Brin gauche -->
  <path d="M 180 100 C 160 130 200 160 180 190 C 160 220 200 250 180 280 C 160 310 200 340 180 370"
        fill="none" stroke="#00C9A7" stroke-width="8" stroke-linecap="round"/>
  <!-- Brin droit -->
  <path d="M 332 100 C 352 130 312 160 332 190 C 352 220 312 250 332 280 C 352 310 312 340 332 370"
