  <!-- Barreaux de connexion -->
  <line x1="190" y1="130" x2="322" y2="148" stroke="#00C9A7" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="185" y1="175" x2="325" y2="165" stroke="#6366F1" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="190" y1="218" x2="322" y2="222" stroke="#00C9A7" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="185" y1="258" x2="325" y2="262" stroke="#6366F1" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="190" y1="300" x2="322" y2="298" stroke="#00C9A7" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="185" y1="345" x2="325" y2="348" stroke="#6366F1" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

  <!-- Points sur les nœuds -->
  <circle cx="180" cy="100" r="7" fill="#00C9A7"/>
  <circle cx="332" cy="100" r="7" fill="#6366F1"/>
  <circle cx="180" cy="190" r="7" fill="#00C9A7"/>
  <circle cx="332" cy="190" r="7" fill="#6366F1"/>
  <circle cx="180" cy="280" r="7" fill="#00C9A7"/>
  <circle cx="332" cy="280" r="7" fill="#6366F1"/>
  <circle cx="180" cy="370" r="7" fill="#00C9A7"/>
  <circle cx="332" cy="370" r="7" fill="#6366F1"/>

  <!-- Texte PT -->
  <text x="256" y="460"
        font-size="52"
        text-anchor="middle"
        fill="#00C9A7"
