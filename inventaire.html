<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PeptideScanner — Inventaire</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg:#F8F9FA; --surface:#FFFFFF; --surface2:#F4F6F8; --border:#E2E8F0;
    --accent:#0D9488; --accent2:#2B6CB0; --accent3:#F97316;
    --text:#1F2937; --muted:#6B7280; --danger:#DC2626; --nav-h:64px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Space Grotesk',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:120px; }

  /* TOPBAR */
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; box-shadow:0 1px 8px rgba(0,0,0,.06); }
  .topbar-logo { font-family:'Space Mono',monospace; font-size:.85rem; font-weight:700; color:var(--accent); display:flex; align-items:center; gap:6px; }
  .logo-dot { width:6px; height:6px; background:var(--accent); border-radius:50%; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.6)} }
  .topbar h1 { font-size:1rem; font-weight:700; }
  .add-btn { width:36px; height:36px; background:var(--accent); border-radius:10px; border:none; color:#fff; font-size:1.4rem; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:700; transition:opacity .2s; }
  .add-btn:hover { opacity:.85; }

  .content { padding:16px 20px 0; max-width:480px; margin:0 auto; }

  /* SECTION LABEL */
  .section-label { font-size:.7rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); font-family:'Space Mono',monospace; margin-bottom:10px; margin-top:4px; }
  .section-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .section-head h2 { font-size:.7rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); font-family:'Space Mono',monospace; }

  /* SUMMARY CARDS */
  .summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
  .summary-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:14px; box-shadow:0 2px 8px rgba(0,0,0,.04); }
  .summary-card.alert { border-color:rgba(220,38,38,.3); background:rgba(220,38,38,.03); }
  .summary-card.warning { border-color:rgba(249,115,22,.3); background:rgba(249,115,22,.03); }
  .summary-label { font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:6px; }
  .summary-val { font-family:'Space Mono',monospace; font-size:1.6rem; font-weight:700; line-height:1; color:var(--text); }
  .summary-val.green { color:var(--accent); }
  .summary-val.red { color:var(--danger); }
  .summary-val.amber { color:var(--accent3); }
  .summary-sub { font-size:.68rem; color:var(--muted); margin-top:4px; }

  /* FLACON CARD */
  .flacon-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:18px; padding:18px; margin-bottom:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.04);
    transition:border-color .2s;
  }
  .flacon-card.critical { border-color:rgba(220,38,38,.4); border-left:4px solid var(--danger); }
  .flacon-card.warning  { border-color:rgba(249,115,22,.4); border-left:4px solid var(--accent3); }
  .flacon-card.ok       { border-left:4px solid var(--accent); }
  .flacon-card.expired  { border-color:rgba(220,38,38,.3); opacity:.75; }

  .flacon-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
  .flacon-name { font-size:1rem; font-weight:700; margin-bottom:3px; }
  .flacon-dosage { font-size:.75rem; color:var(--muted); }
  .flacon-badges { display:flex; gap:6px; flex-direction:column; align-items:flex-end; }

  .badge {
    display:inline-flex; align-items:center; gap:4px;
    padding:3px 8px; border-radius:100px; font-size:.65rem; font-weight:700;
    font-family:'Space Mono',monospace; white-space:nowrap;
  }
  .badge-green  { background:rgba(13,148,136,.1);  color:var(--accent); }
  .badge-amber  { background:rgba(249,115,22,.1);  color:var(--accent3); }
  .badge-red    { background:rgba(220,38,38,.1);   color:var(--danger); }
  .badge-blue   { background:rgba(43,108,176,.1);  color:var(--accent2); }
  .badge-gray   { background:var(--surface2);      color:var(--muted); }

  /* BARRE STOCK */
  .stock-section { margin-bottom:14px; }
  .stock-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .stock-label { font-size:.72rem; color:var(--muted); }
  .stock-val { font-family:'Space Mono',monospace; font-size:.82rem; font-weight:700; }
  .stock-bar { height:8px; background:var(--surface2); border-radius:100px; overflow:hidden; }
  .stock-fill { height:100%; border-radius:100px; transition:width .5s ease; }
  .stock-fill.green { background:linear-gradient(90deg, var(--accent), #14b8a6); }
  .stock-fill.amber { background:linear-gradient(90deg, var(--accent3), #fbbf24); }
  .stock-fill.red   { background:linear-gradient(90deg, var(--danger), #f87171); }

  /* INFOS GRILLE */
  .flacon-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
  .info-chip { background:var(--surface2); border-radius:10px; padding:8px 10px; }
  .info-chip-label { font-size:.6rem; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin-bottom:3px; }
  .info-chip-val { font-family:'Space Mono',monospace; font-size:.82rem; font-weight:700; }
  .info-chip-val.red { color:var(--danger); }
  .info-chip-val.amber { color:var(--accent3); }
  .info-chip-val.green { color:var(--accent); }

  /* ACTIONS */
  .flacon-actions { display:flex; gap:8px; }
  .flacon-btn {
    flex:1; padding:9px; border-radius:10px; border:1.5px solid var(--border);
    background:transparent; color:var(--muted); font-family:inherit;
    font-size:.78rem; font-weight:600; cursor:pointer; transition:all .2s;
  }
  .flacon-btn:hover { border-color:var(--accent); color:var(--accent); }
  .flacon-btn.danger:hover { border-color:var(--danger); color:var(--danger); }
  .flacon-btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  .flacon-btn.primary:hover { opacity:.88; }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:48px 20px; color:var(--muted); }
  .empty-state span { font-size:2.8rem; display:block; margin-bottom:14px; }
  .empty-state h3 { font-size:1rem; font-weight:700; color:var(--text); margin-bottom:8px; }
  .empty-state p { font-size:.84rem; line-height:1.6; margin-bottom:20px; }
  .empty-state button { background:var(--accent); color:#fff; border:none; padding:12px 24px; border-radius:10px; font-family:inherit; font-size:.88rem; font-weight:700; cursor:pointer; }

  /* ALERTE PÉREMPTION */
  .peremption-banner {
    display:flex; align-items:flex-start; gap:10px;
    background:rgba(220,38,38,.06); border:1.5px solid rgba(220,38,38,.2);
    border-radius:14px; padding:12px 14px; margin-bottom:16px;
  }
  .peremption-banner-icon { font-size:1.2rem; flex-shrink:0; }
  .peremption-banner-text { font-size:.78rem; line-height:1.6; }
  .peremption-banner-text strong { color:var(--danger); display:block; margin-bottom:2px; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; z-index:500; background:rgba(0,0,0,.4); backdrop-filter:blur(4px); display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity .25s; }
  .modal-overlay.show { opacity:1; pointer-events:all; }
  .modal-sheet { background:var(--surface); border-radius:22px 22px 0 0; padding:24px 20px 40px; width:100%; max-width:520px; transform:translateY(100%); transition:transform .3s cubic-bezier(.4,0,.2,1); max-height:92vh; overflow-y:auto; }
  .modal-overlay.show .modal-sheet { transform:translateY(0); }
  .modal-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
  .modal-title { font-size:1.1rem; font-weight:700; margin-bottom:18px; }

  /* FORM */
  .form-group { margin-bottom:14px; }
  .form-label { font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:7px; display:block; font-weight:600; }
  .form-input { width:100%; background:var(--surface2); border:1.5px solid var(--border); border-radius:10px; padding:12px 14px; color:var(--text); font-family:'Space Grotesk',sans-serif; font-size:.95rem; outline:none; transition:border-color .2s; }
  .form-input:focus { border-color:var(--accent); background:#fff; }
  .form-select { width:100%; background:var(--surface2); border:1.5px solid var(--border); border-radius:10px; padding:12px 14px; color:var(--text); font-family:inherit; font-size:.9rem; outline:none; transition:border-color .2s; cursor:pointer; }
  .form-select:focus { border-color:var(--accent); }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .save-btn { width:100%; padding:14px; border-radius:12px; border:none; background:var(--accent); color:#fff; font-family:inherit; font-size:.95rem; font-weight:700; cursor:pointer; margin-top:6px; transition:opacity .2s; }
  .save-btn:hover { opacity:.88; }
  .cancel-btn { width:100%; padding:12px; border-radius:12px; border:1.5px solid var(--border); background:transparent; color:var(--muted); font-family:inherit; font-size:.88rem; font-weight:600; cursor:pointer; margin-top:8px; }

  /* BOTTOM NAV */
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:200; background:rgba(255,255,255,.97); backdrop-filter:blur(16px); border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-around; height:var(--nav-h); padding:0 4px; box-shadow:0 -2px 12px rgba(0,0,0,.04); }
  .nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; padding:8px 8px; border-radius:12px; cursor:pointer; text-decoration:none; color:var(--muted); transition:all .2s; min-width:44px; }
  .nav-item.active { color:var(--accent); }
  .nav-icon { font-size:1.15rem; line-height:1; }
  .nav-label { font-size:.52rem; font-weight:600; letter-spacing:.5px; text-transform:uppercase; }
  .nav-dot { width:4px; height:4px; background:var(--accent); border-radius:50%; margin-top:1px; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .flacon-card { animation:fadeIn .3s ease both; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo"><div class="logo-dot"></div>PeptideScanner</div>
  <h1>Stock</h1>
  <button class="add-btn" onclick="openModal()" title="Ajouter un flacon">+</button>
</div>

<!-- STATS BAR -->
<div id="statsBar" style="display:flex;gap:10px;padding:12px 20px 0;max-width:480px;margin:0 auto"></div>

<!-- GRILLE FLACONS -->
<div class="content" id="mainContent"></div>

<nav class="bottom-nav">
  <a class="nav-item" href="dashboard.html"><span class="nav-icon">🏠</span><span class="nav-label">Accueil</span></a>
  <a class="nav-item" href="cure.html"><span class="nav-icon">📅</span><span class="nav-label">Cure</span></a>
  <a class="nav-item" href="calculateur.html"><span class="nav-icon">🧮</span><span class="nav-label">Calcul</span></a>
  <a class="nav-item active" href="inventaire.html"><span class="nav-icon">🧪</span><span class="nav-label">Stock</span><div class="nav-dot"></div></a>
  <a class="nav-item" href="analytics.html"><span class="nav-icon">📊</span><span class="nav-label">Analyse</span></a>
  <a class="nav-item" href="profil.html"><span class="nav-icon">👤</span><span class="nav-label">Profil</span></a>
</nav>

<!-- MODAL -->
<div class="modal-overlay" id="flaconModal" onclick="closeIfOverlay(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Ajouter un flacon</div>
    <div class="form-group">
      <label class="form-label">Peptide</label>
      <input class="form-input" id="fPeptide" type="text" placeholder="Ex: BPC-157, HGH…">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Quantité totale</label>
        <input class="form-input" id="fQty" type="number" placeholder="10" min="0.1" step="0.1">
      </div>
      <div class="form-group">
        <label class="form-label">Unité</label>
        <select class="form-select" id="fUnit">
          <option value="mg">mg</option>
          <option value="mcg">mcg</option>
          <option value="IU">IU</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Dose / injection</label>
        <input class="form-input" id="fDosePerInj" type="number" placeholder="0.25" min="0.01" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">Injections/jour</label>
        <input class="form-input" id="fFreqPerDay" type="number" placeholder="1" min="0.1" step="0.1">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date reconstitution</label>
        <input class="form-input" id="fReconDate" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">Statut</label>
        <select class="form-select" id="fStatus">
          <option value="active">En cours</option>
          <option value="sealed">Scellé</option>
          <option value="finished">Terminé</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Note (optionnel)</label>
      <input class="form-input" id="fNote" type="text" placeholder="Ex: Lot 2025, cure récupération…">
    </div>
    <input type="hidden" id="fEditId">
    <button class="save-btn" onclick="saveFlacon()">Enregistrer le flacon</button>
    <button class="cancel-btn" onclick="closeModal()">Annuler</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL      = 'https://dkwztwlkjewdzfichkgk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrd3p0d2xramV3ZHpmaWNoa2drIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MjYwOTAsImV4cCI6MjA5NzQwMjA5MH0.iT7ylcNvPCf2jMUYfJlsDJcoGjPolphQWONFusAAlAk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function fmt(d) { return d?new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}):'—'; }

const TODAY = new Date(); TODAY.setHours(0,0,0,0);
let userId=null, allInventory=[];

async function init() {
  const { data } = await sb.auth.getSession();
  if (!data?.session) { window.location.href='/login.html'; return; }
  userId = data.session.user.id;
  await loadData();
}

async function loadData() {
  const { data } = await sb.from('inventory').select('*').eq('user_id',userId).order('created_at',{ascending:false});
  allInventory = data || [];
  render();
}

// ── FLACON SVG ─────────────────────────────────────────────────
function vialSVG(pct, color, isSealed) {
  const capColor  = isSealed ? '#94A3B8' : color;
  const fillH     = Math.round(pct * 52 / 100); // max fill height = 52px
  const fillY     = 44 + (52 - fillH);           // starts from bottom of body

  const uid = Math.random().toString(36).substr(2,6);
  return `<svg viewBox="0 0 48 110" xmlns="http://www.w3.org/2000/svg" style="width:48px;height:110px;filter:drop-shadow(0 3px 8px rgba(0,0,0,.15))">
    <defs>
      <clipPath id="bodyClip_${uid}">
        <rect x="8" y="42" width="32" height="54" rx="5"/>
      </clipPath>
      <linearGradient id="bodyGrad_${uid}" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#f0f4f8"/>
        <stop offset="40%" stop-color="#ffffff"/>
        <stop offset="100%" stop-color="#e2e8f0"/>
      </linearGradient>
      <linearGradient id="capGrad_${uid}" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="${capColor}" stop-opacity=".7"/>
        <stop offset="50%" stop-color="${capColor}"/>
        <stop offset="100%" stop-color="${capColor}" stop-opacity=".8"/>
      </linearGradient>
    </defs>

    <!-- Capuchon aluminium -->
    <rect x="14" y="2" width="20" height="18" rx="4" fill="url(#capGrad_${uid})"/>
    <!-- Bord inférieur capuchon (rebord) -->
    <rect x="12" y="18" width="24" height="4" rx="1" fill="${capColor}" opacity=".6"/>

    <!-- Septum caoutchouc -->
    <ellipse cx="24" cy="26" rx="10" ry="5" fill="#CBD5E1"/>
    <ellipse cx="24" cy="25" rx="8" ry="3.5" fill="#94A3B8"/>
    <!-- Point central septum -->
    <circle cx="24" cy="25" r="2" fill="#64748B"/>

    <!-- Col du flacon -->
    <rect x="17" y="28" width="14" height="14" rx="3" fill="url(#bodyGrad_${uid})" stroke="#E2E8F0" stroke-width="1"/>

    <!-- Corps principal -->
    <rect x="8" y="42" width="32" height="54" rx="5" fill="url(#bodyGrad_${uid})" stroke="#D1D9E0" stroke-width="1.2"/>

    <!-- Liquide -->
    ${pct > 0 ? `<rect x="8" y="${fillY}" width="32" height="${fillH}" fill="${color}" opacity=".18" clip-path="url(#bodyClip_${uid})"/>
    <rect x="8" y="${fillY}" width="32" height="2.5" fill="${color}" opacity=".35" clip-path="url(#bodyClip_${uid})"/>` : ''}

    <!-- Reflet gauche -->
    <rect x="12" y="46" width="4" height="36" rx="2" fill="white" opacity=".55"/>

    <!-- Graduations -->
    <line x1="36" y1="56" x2="40" y2="56" stroke="#CBD5E1" stroke-width="1"/>
    <line x1="36" y1="66" x2="40" y2="66" stroke="#CBD5E1" stroke-width="1"/>
    <line x1="36" y1="76" x2="40" y2="76" stroke="#CBD5E1" stroke-width="1"/>
    <line x1="36" y1="86" x2="40" y2="86" stroke="#CBD5E1" stroke-width="1"/>

    <!-- Étiquette -->
    <rect x="10" y="58" width="20" height="22" rx="2" fill="white" opacity=".7" stroke="${color}" stroke-width=".8" stroke-opacity=".3"/>

    <!-- Base arrondie -->
    <rect x="9" y="92" width="30" height="4" rx="2" fill="#E2E8F0"/>
  </svg>`;
}

// ── RENDER ─────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('mainContent');
  const statsBar  = document.getElementById('statsBar');

  // Stats
  const active  = allInventory.filter(f => (f.notes||'').includes('active')||(!f.notes&&f.remaining_units>0));
  const low     = allInventory.filter(f => f.vial_qty_mg && f.remaining_units!==null && (f.remaining_units/f.vial_qty_mg)<0.2);
  statsBar.innerHTML = `
    <div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center">
      <div style="font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700;color:var(--accent)">${allInventory.length}</div>
      <div style="font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px">flacons</div>
    </div>
    <div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center">
      <div style="font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700;color:var(--accent3)">${low.length}</div>
      <div style="font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px">stock bas</div>
    </div>
    <div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center">
      <div style="font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700;color:var(--accent2)">${allInventory.filter(f=>f.expiry_date&&new Date(f.expiry_date)<TODAY).length}</div>
      <div style="font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px">expirés</div>
    </div>`;

  if (allInventory.length === 0) {
    container.innerHTML = `<div class="empty-state" style="text-align:center;padding:60px 20px">
      ${vialSVG(0,'#0D9488',true)}
      <p style="margin-top:16px;color:var(--muted);font-size:.9rem">Aucun flacon enregistré.<br>Ajoutez votre premier flacon.</p>
      <button onclick="openModal()" style="margin-top:16px;padding:12px 24px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer">+ Ajouter un flacon</button>
    </div>`;
    return;
  }

  // Grille de flacons
  container.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;padding:16px 16px 0;max-width:480px;margin:0 auto">
    ${allInventory.map(f => {
      const remaining = f.remaining_units ?? f.vial_qty_mg ?? 0;
      const total     = f.vial_qty_mg ?? 1;
      const pct       = total > 0 ? Math.min(100, Math.round((remaining/total)*100)) : 0;
      const isExpired = f.expiry_date && new Date(f.expiry_date) < TODAY;
      const isLow     = pct < 20 && pct > 0;
      const isSealed  = (f.notes||'').includes('sealed') || (!f.reconstituted_at);

      const color = isExpired ? '#DC2626' : isLow ? '#F97316' : '#0D9488';
      const badgeHtml = isExpired
        ? `<div style="background:#FEF2F2;color:#DC2626;font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:100px;margin-bottom:6px">⚠️ EXPIRÉ</div>`
        : isLow
        ? `<div style="background:#FFF7ED;color:#F97316;font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:100px;margin-bottom:6px">⚠️ STOCK BAS</div>`
        : isSealed
        ? `<div style="background:rgba(100,116,139,.1);color:#64748B;font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:100px;margin-bottom:6px">🔒 SCELLÉ</div>`
        : '';

      return `<div style="background:var(--surface);border:1.5px solid ${isExpired?'rgba(220,38,38,.2)':isLow?'rgba(249,115,22,.2)':'var(--border)'};border-radius:18px;padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:transform .15s,box-shadow .15s" onclick="openEditModal('${f.id}')" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 24px rgba(0,0,0,.08)'" onmouseout="this.style.transform='';this.style.boxShadow=''">
        ${vialSVG(pct, color, isSealed)}
        ${badgeHtml}
        <div style="font-weight:700;font-size:.84rem;text-align:center;line-height:1.3">${f.peptide_name}</div>
        <div style="font-family:'Space Mono',monospace;font-size:.8rem;color:${color};font-weight:700">${pct}%</div>
        <div style="font-size:.68rem;color:var(--muted);text-align:center">${remaining} / ${total} ${f.vial_qty_mg?'mg':''}</div>
        ${f.expiry_date?`<div style="font-size:.65rem;color:var(--muted)">exp. ${fmt(f.expiry_date)}</div>`:''}
        <button onclick="event.stopPropagation();confirmDelete('${f.id}')" style="margin-top:6px;padding:4px 12px;background:rgba(220,38,38,.08);color:var(--danger);border:1px solid rgba(220,38,38,.2);border-radius:8px;font-family:inherit;font-size:.68rem;font-weight:600;cursor:pointer">🗑 Supprimer</button>
      </div>`;
    }).join('')}
    <!-- Bouton ajouter -->
    <div onclick="openModal()" style="background:var(--surface);border:1.5px dashed var(--border);border-radius:18px;padding:16px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;min-height:180px;transition:border-color .2s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
      <div style="font-size:2rem;color:var(--border)">+</div>
      <div style="font-size:.75rem;color:var(--muted);text-align:center">Ajouter un flacon</div>
    </div>
  </div>`;
}

// ── MODAL ──────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modalTitle').textContent = 'Ajouter un flacon';
  document.getElementById('fEditId').value = '';
  ['fPeptide','fNote'].forEach(id=>{ const e=document.getElementById(id); if(e) e.value=''; });
  document.getElementById('fQty').value        = '';
  document.getElementById('fDosePerInj').value = '';
  document.getElementById('fFreqPerDay').value = '';
  document.getElementById('fUnit').value       = 'mg';
  document.getElementById('fStatus').value     = 'active';
  document.getElementById('fReconDate').value  = new Date().toISOString().split('T')[0];
  document.getElementById('flaconModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function openEditModal(id) {
  const f = allInventory.find(x=>x.id===id);
  if (!f) return;
  document.getElementById('modalTitle').textContent = 'Modifier le flacon';
  document.getElementById('fEditId').value     = id;
  document.getElementById('fPeptide').value    = f.peptide_name||'';
  document.getElementById('fQty').value        = f.vial_qty_mg||'';
  document.getElementById('fDosePerInj').value = '';
  document.getElementById('fFreqPerDay').value = '';
  document.getElementById('fUnit').value       = 'mg';
  document.getElementById('fReconDate').value  = f.reconstituted_at||'';
  document.getElementById('fNote').value       = f.notes||'';
  const statusMap = { active:'active', sealed:'sealed', finished:'finished' };
  document.getElementById('fStatus').value = f.notes?.includes('sealed')?'sealed':f.notes?.includes('finished')?'finished':'active';
  document.getElementById('flaconModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

async function saveFlacon() {
  const peptide = document.getElementById('fPeptide')?.value.trim();
  if (!peptide) { showToast('⚠️ Nom du peptide requis'); return; }
  const qty    = parseFloat(document.getElementById('fQty')?.value)||null;
  const dose   = parseFloat(document.getElementById('fDosePerInj')?.value)||null;
  const freq   = parseFloat(document.getElementById('fFreqPerDay')?.value)||null;
  const recon  = document.getElementById('fReconDate')?.value||null;
  const note   = document.getElementById('fNote')?.value||null;
  const status = document.getElementById('fStatus')?.value||'active';
  const editId = document.getElementById('fEditId')?.value;

  // Calculer jours restants si dose et fréquence connues
  let remaining = qty;
  if (qty && dose && freq) {
    const totalDoses = qty/dose;
    const daysLeft   = totalDoses/freq;
    // remaining = qty (on commence avec tout)
  }

  const payload = {
    peptide_name:    peptide,
    vial_qty_mg:     qty,
    remaining_units: editId ? undefined : qty,
    reconstituted_at:recon,
    notes:           status + (note ? ' | '+note : ''),
  };

  if (editId) {
    await sb.from('inventory').update(payload).eq('id',editId);
    showToast('✓ Flacon mis à jour');
  } else {
    await sb.from('inventory').insert({...payload, user_id:userId});
    showToast('✓ Flacon ajouté');
  }
  closeModal();
  await loadData();
}

function editFlacon(id)  { openEditModal(id); }
function deleteFlacon(id){ confirmDelete(id); }

async function confirmDelete(id) {
  if (!confirm('Supprimer ce flacon ?')) return;
  await sb.from('inventory').delete().eq('id',id);
  showToast('Flacon supprimé');
  await loadData();
}

function closeModal()      { document.getElementById('flaconModal').classList.remove('show'); document.body.style.overflow=''; }
function closeIfOverlay(e) { if(e.target===document.getElementById('flaconModal')) closeModal(); }

init();
