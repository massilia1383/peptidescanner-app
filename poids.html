<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PeptideScanner — Poids</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg:#F8F9FA; --surface:#FFFFFF; --surface2:#F4F6F8; --border:#E2E8F0;
    --accent:#0D9488; --accent2:#2B6CB0; --accent3:#F97316;
    --text:#1F2937; --muted:#6B7280; --danger:#DC2626; --nav-h:64px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Space Grotesk',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:calc(var(--nav-h)+40px); }

  .topbar { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:rgba(248,249,250,.97); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; backdrop-filter:blur(12px); }
  .topbar h1 { font-size:1.1rem; font-weight:700; }
  .topbar-logo { font-family:'Space Mono',monospace; font-size:.85rem; font-weight:700; color:var(--accent); display:flex; align-items:center; gap:6px; }
  .logo-dot { width:6px; height:6px; background:var(--accent); border-radius:50%; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.6)} }
  .add-btn { width:36px; height:36px; background:var(--accent); border-radius:10px; border:none; color:#000; font-size:1.3rem; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:700; }

  .content { padding:16px 20px 0; max-width:480px; margin:0 auto; }

  /* PERIOD TABS */
  .period-tabs { display:flex; gap:6px; margin-bottom:16px; }
  .period-tab { flex:1; padding:8px; border-radius:10px; border:1px solid var(--border); background:var(--surface); color:var(--muted); font-size:.78rem; font-weight:600; cursor:pointer; text-align:center; transition:all .2s; }
  .period-tab.active { background:rgba(0,201,167,.12); border-color:rgba(0,201,167,.4); color:var(--accent); }

  /* STATS */
  .weight-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
  .ws-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px 10px; text-align:center; }
  .ws-val { font-family:'Space Mono',monospace; font-size:1.2rem; font-weight:700; margin-bottom:4px; }
  .ws-val.green { color:var(--accent); }
  .ws-val.red { color:var(--danger); }
  .ws-val.amber { color:var(--accent3); }
  .ws-label { font-size:.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; }

  /* CHART */
  .chart-card { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:18px; margin-bottom:16px; }
  .chart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .chart-header h3 { font-size:.9rem; font-weight:600; }
  .chart-unit { font-size:.75rem; color:var(--muted); font-family:'Space Mono',monospace; }
  .chart-wrap { position:relative; height:180px; }
  .chart-wrap svg { width:100%; height:100%; overflow:visible; }
  .chart-labels { display:flex; justify-content:space-between; margin-top:6px; }
  .chart-labels span { font-size:.65rem; color:var(--muted); font-family:'Space Mono',monospace; }

  /* TOOLTIP */
  .chart-tooltip {
    position:absolute; background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:6px 10px; font-size:.75rem; pointer-events:none;
    opacity:0; transition:opacity .15s; white-space:nowrap; z-index:10;
  }
  .chart-tooltip.show { opacity:1; }
  .tt-val { font-family:'Space Mono',monospace; font-weight:700; color:var(--accent); }
  .tt-date { color:var(--muted); font-size:.68rem; }

  /* ADD WEIGHT */
  .add-weight-card { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:18px; margin-bottom:16px; }
  .add-weight-card h3 { font-size:.9rem; font-weight:600; margin-bottom:14px; }
  .weight-input-row { display:flex; gap:10px; align-items:center; }
  .weight-num-input {
    flex:1; background:var(--surface2); border:1px solid var(--border);
    border-radius:12px; padding:14px 16px; color:var(--text);
    font-family:'Space Mono',monospace; font-size:1.4rem; font-weight:700;
    outline:none; text-align:center; transition:border-color .2s;
  }
  .weight-num-input:focus { border-color:var(--accent); }
  .weight-unit { font-family:'Space Mono',monospace; font-size:1rem; color:var(--muted); flex-shrink:0; }
  .weight-add-btn { background:var(--accent); color:#000; border:none; border-radius:12px; padding:14px 20px; font-family:inherit; font-size:.9rem; font-weight:700; cursor:pointer; transition:opacity .2s; flex-shrink:0; }
  .weight-add-btn:hover { opacity:.85; }
  .weight-date-row { display:flex; gap:10px; align-items:center; margin-top:10px; }
  .weight-date-input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 14px; color:var(--text); font-family:inherit; font-size:.84rem; outline:none; }
  .weight-note-input { flex:2; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 14px; color:var(--text); font-family:inherit; font-size:.84rem; outline:none; }
  .weight-note-input::placeholder { color:var(--muted); }
  .weight-note-input:focus, .weight-date-input:focus { border-color:var(--accent); }

  /* HISTORY */
  .history-card { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:18px; margin-bottom:16px; }
  .history-card h3 { font-size:.9rem; font-weight:600; margin-bottom:14px; }
  .hist-item { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid rgba(30,45,69,.5); }
  .hist-item:last-child { border-bottom:none; padding-bottom:0; }
  .hist-date { font-family:'Space Mono',monospace; font-size:.72rem; color:var(--muted); flex-shrink:0; width:56px; }
  .hist-val { font-family:'Space Mono',monospace; font-size:1rem; font-weight:700; color:var(--accent); }
  .hist-diff { font-size:.75rem; margin-left:4px; }
  .hist-diff.up { color:var(--danger); }
  .hist-diff.down { color:#22C55E; }
  .hist-note { font-size:.75rem; color:var(--muted); flex:1; margin-left:8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .hist-del { background:transparent; border:none; color:var(--border); cursor:pointer; font-size:.85rem; padding:4px; transition:color .2s; flex-shrink:0; }
  .hist-del:hover { color:var(--danger); }

  /* BMI */
  .bmi-card { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:18px; margin-bottom:16px; }
  .bmi-card h3 { font-size:.9rem; font-weight:600; margin-bottom:14px; }
  .bmi-val { font-family:'Space Mono',monospace; font-size:2rem; font-weight:700; }
  .bmi-bar { height:8px; background:var(--border); border-radius:4px; margin:12px 0 6px; overflow:hidden; position:relative; }
  .bmi-fill { height:100%; border-radius:4px; transition:width .5s; }
  .bmi-labels { display:flex; justify-content:space-between; font-size:.65rem; color:var(--muted); }
  .bmi-status { font-size:.82rem; margin-top:8px; font-weight:600; }

  /* BOTTOM NAV */
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:200; background:rgba(255,255,255,.97); backdrop-filter:blur(16px); border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-around; height:var(--nav-h); padding:0 8px; }
  .nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 14px; border-radius:12px; cursor:pointer; text-decoration:none; color:var(--muted); transition:all .2s; min-width:56px; }
  .nav-item.active { color:var(--accent); }
  .nav-icon { font-size:1.3rem; line-height:1; }
  .nav-label { font-size:.6rem; font-weight:600; letter-spacing:.5px; text-transform:uppercase; }
  .nav-dot { width:4px; height:4px; background:var(--accent); border-radius:50%; margin-top:2px; }

  .toast { position:fixed; bottom:calc(var(--nav-h)+16px); left:50%; transform:translateX(-50%) translateY(20px); background:var(--accent); color:#000; padding:10px 20px; border-radius:100px; font-size:.82rem; font-weight:700; opacity:0; pointer-events:none; transition:all .3s; z-index:300; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  .empty-chart { display:flex; align-items:center; justify-content:center; height:180px; color:var(--muted); font-size:.85rem; flex-direction:column; gap:8px; }
  .empty-chart span { font-size:2rem; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo"><div class="logo-dot"></div>PeptideScanner</div>
  <h1>Suivi du poids</h1>
  <button class="add-btn" onclick="focusInput()">＋</button>
</div>

<div class="content">

  <!-- PERIOD -->
  <div class="period-tabs">
    <div class="period-tab active" onclick="setPeriod(7,this)">7j</div>
    <div class="period-tab" onclick="setPeriod(30,this)">30j</div>
    <div class="period-tab" onclick="setPeriod(90,this)">3 mois</div>
    <div class="period-tab" onclick="setPeriod(0,this)">Tout</div>
  </div>

  <!-- STATS -->
  <div class="weight-stats" id="weightStats"></div>

  <!-- CHART -->
  <div class="chart-card">
    <div class="chart-header">
      <h3>Évolution</h3>
      <span class="chart-unit">kg</span>
    </div>
    <div class="chart-wrap" id="chartWrap">
      <div class="empty-chart" id="emptyChart"><span>⚖️</span>Ajoutez votre premier poids</div>
      <svg id="mainChart" style="display:none"></svg>
      <div class="chart-tooltip" id="tooltip"><div class="tt-val" id="ttVal"></div><div class="tt-date" id="ttDate"></div></div>
    </div>
    <div class="chart-labels" id="chartLabels"></div>
  </div>

  <!-- ADD WEIGHT -->
  <div class="add-weight-card">
    <h3>Enregistrer mon poids</h3>
    <div class="weight-input-row">
      <input class="weight-num-input" id="weightInput" type="number" step="0.1" min="30" max="300" placeholder="75.0">
      <span class="weight-unit">kg</span>
      <button class="weight-add-btn" onclick="addWeight()">Ajouter</button>
    </div>
    <div class="weight-date-row">
      <input class="weight-date-input" id="weightDate" type="date">
      <input class="weight-note-input" id="weightNote" type="text" placeholder="Note (optionnel)">
    </div>
  </div>

  <!-- BMI -->
  <div class="bmi-card" id="bmiCard" style="display:none">
    <h3>IMC</h3>
    <div id="bmiContent"></div>
  </div>

  <!-- HISTORY -->
  <div class="history-card">
    <h3>Historique</h3>
    <div id="historyList"><div style="text-align:center;padding:16px;color:var(--muted);font-size:.84rem">Aucune donnée</div></div>
  </div>

</div>

<nav class="bottom-nav">
  <a class="nav-item" href="dashboard.html"><span class="nav-icon">🏠</span><span class="nav-label">Accueil</span></a>
  <a class="nav-item" href="peptide-database.html"><span class="nav-icon">🧬</span><span class="nav-label">Biblio</span></a>
  <a class="nav-item" href="cure.html"><span class="nav-icon">📅</span><span class="nav-label">Cure</span></a>
  <a class="nav-item active" href="poids.html"><span class="nav-icon">⚖️</span><span class="nav-label">Poids</span><div class="nav-dot"></div></a>
  <a class="nav-item" href="alertes.html"><span class="nav-icon">🔔</span><span class="nav-label">Alertes</span></a>
  <a class="nav-item" href="inventaire.html">
    <span class="nav-icon">🧪</span>
    <span class="nav-label">Stock</span>
  </a>
  <a class="nav-item" href="profil.html"><span class="nav-icon">👤</span><span class="nav-label">Profil</span></a>
</nav>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL      = 'https://dkwztwlkjewdzfichkgk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrd3p0d2xramV3ZHpmaWNoa2drIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MjYwOTAsImV4cCI6MjA5NzQwMjA5MH0.iT7ylcNvPCf2jMUYfJlsDJcoGjPolphQWONFusAAlAk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const todayStr = `${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}-${String(TODAY.getDate()).padStart(2,'0')}`;
let userId=null, allWeights=[], currentPeriod=30, editId=null, heightCm=null;

async function init() {
  const { data } = await sb.auth.getSession();
  if (!data?.session) { window.location.href='/login.html'; return; }
  userId = data.session.user.id;
  document.getElementById('weightDate').value = todayStr;

  // Récupérer la taille depuis le profil ou localStorage
  const { data: profil } = await sb.from('profiles').select('*').eq('id', userId).single();
  heightCm = profil?.height_cm || parseInt(localStorage.getItem('ps_height_cm')) || null;

  await loadData();
}

async function loadData() {
  const { data } = await sb.from('weight_logs').select('*').eq('user_id',userId).order('logged_at',{ascending:true}).limit(365);
  allWeights = data || [];

  // Si premier ajout et pas de taille → afficher le modal taille
  if (allWeights.length === 0 && !heightCm) showHeightPrompt();

  render();
}

// ── MODAL TAILLE (premier ajout) ──────────────────────────────
function showHeightPrompt() {
  const existing = document.getElementById('heightPrompt');
  if (existing) return;
  const el = document.createElement('div');
  el.id = 'heightPrompt';
  el.style.cssText = 'background:rgba(13,148,136,.07);border:1.5px solid rgba(13,148,136,.2);border-radius:14px;padding:16px;margin-bottom:12px;';
  el.innerHTML = `
    <div style="font-size:.84rem;font-weight:700;margin-bottom:4px;color:var(--accent)">📏 Votre taille ?</div>
    <div style="font-size:.78rem;color:var(--muted);margin-bottom:10px">Nécessaire pour calculer votre IMC correctement.</div>
    <div style="display:flex;gap:8px;align-items:center">
      <input id="heightInput" type="number" min="100" max="250" placeholder="178" style="flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:.9rem;outline:none">
      <span style="color:var(--muted);font-size:.84rem">cm</span>
      <button onclick="saveHeight()" style="padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:inherit;font-weight:700;cursor:pointer">OK</button>
    </div>`;
  const addCard = document.querySelector('.add-weight-card');
  if (addCard) addCard.insertAdjacentElement('beforebegin', el);
}

async function saveHeight() {
  const val = parseInt(document.getElementById('heightInput')?.value);
  if (!val || val < 100 || val > 250) { showToast('⚠️ Taille invalide'); return; }
  heightCm = val;
  localStorage.setItem('ps_height_cm', val);
  try { await sb.from('profiles').update({ height_cm: val }).eq('id', userId); } catch(e) {}
  document.getElementById('heightPrompt')?.remove();
  showToast('✓ Taille enregistrée');
  render();
}

// ── ADD WEIGHT ─────────────────────────────────────────────────
async function addWeight() {
  // Si pas de taille, demander d'abord
  if (!heightCm) { showHeightPrompt(); showToast('📏 Indiquez votre taille d\'abord'); return; }
  const kg   = parseFloat(document.getElementById('weightInput').value);
  const date = document.getElementById('weightDate').value;
  const note = document.getElementById('weightNote').value;
  if (!kg||kg<30||kg>300) { showToast('⚠️ Poids invalide'); return; }
  if (!date) { showToast('⚠️ Date requise'); return; }
  await sb.from('weight_logs').insert({user_id:userId, weight_kg:kg, logged_at:date, notes:note||null});
  document.getElementById('weightInput').value='';
  document.getElementById('weightNote').value='';
  showToast('✓ Poids enregistré : '+kg+' kg');
  await loadData();
}

// ── EDIT WEIGHT ────────────────────────────────────────────────
function startEdit(id, currentKg, currentNotes) {
  editId = id;
  // Remplacer la ligne par un formulaire d'édition
  const item = document.querySelector(`[data-id="${id}"]`);
  if (!item) return;
  item.innerHTML = `
    <div style="display:flex;gap:8px;align-items:center;flex:1">
      <input id="editKg" type="number" step="0.1" value="${currentKg}" style="width:80px;padding:6px 10px;border:1.5px solid var(--accent);border-radius:8px;font-family:inherit;font-size:.84rem;outline:none">
      <span style="font-size:.78rem;color:var(--muted)">kg</span>
      <input id="editNote" type="text" value="${currentNotes||''}" placeholder="Note..." style="flex:1;padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.78rem;outline:none">
    </div>
    <div style="display:flex;gap:6px">
      <button onclick="saveEdit('${id}')" style="padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:.78rem;font-weight:700;cursor:pointer">✓</button>
      <button onclick="cancelEdit()" style="padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:.78rem;cursor:pointer">✕</button>
    </div>`;
  document.getElementById('editKg')?.focus();
}

async function saveEdit(id) {
  const kg   = parseFloat(document.getElementById('editKg')?.value);
  const note = document.getElementById('editNote')?.value.trim();
  if (!kg||kg<30||kg>300) { showToast('⚠️ Poids invalide'); return; }
  await sb.from('weight_logs').update({weight_kg:kg, notes:note||null}).eq('id',id);
  editId=null;
  showToast('✓ Poids modifié');
  await loadData();
}

function cancelEdit() { editId=null; render(); }

async function deleteWeight(id) {
  await sb.from('weight_logs').delete().eq('id',id);
  showToast('Entrée supprimée');
  await loadData();
}

function focusInput() { document.getElementById('weightInput').focus(); document.getElementById('weightInput').scrollIntoView({behavior:'smooth'}); }

function setPeriod(days,btn) {
  currentPeriod=days;
  document.querySelectorAll('.period-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function getFiltered() {
  if(currentPeriod===0) return allWeights;
  const cutoff=new Date(TODAY); cutoff.setDate(cutoff.getDate()-currentPeriod);
  return allWeights.filter(w=>new Date(w.logged_at)>=cutoff);
}

function render() {
  const filtered=getFiltered();
  renderStats(allWeights,filtered);
  renderChart(filtered);
  renderHistory(allWeights);
  renderBMI(allWeights);
}

function renderStats(all,filtered) {
  const c=document.getElementById('weightStats');
  if(all.length===0){c.innerHTML='';return;}
  const latest=all[all.length-1];
  const first=filtered[0];
  const diff=filtered.length>1?(latest.weight_kg-first.weight_kg).toFixed(1):null;
  const sign=diff>0?'+':'';
  const cls=diff>0?'red':diff<0?'green':'amber';
  c.innerHTML=`
    <div class="ws-card"><div class="ws-val green">${latest.weight_kg}</div><div class="ws-label">kg actuel</div></div>
    <div class="ws-card"><div class="ws-val ${cls}">${diff!==null?sign+diff:'—'}</div><div class="ws-label">variation</div></div>
    <div class="ws-card"><div class="ws-val amber">${filtered.length}</div><div class="ws-label">mesures</div></div>`;
}

function renderChart(weights) {
  const svg=document.getElementById('mainChart');
  const empty=document.getElementById('emptyChart');
  const labels=document.getElementById('chartLabels');
  if(weights.length<2){svg.style.display='none';empty.style.display='flex';labels.innerHTML='';return;}
  svg.style.display='block';empty.style.display='none';
  const W=400,H=180,PL=32,PR=10,PT=10,PB=20;
  const vals=weights.map(w=>w.weight_kg);
  const mn=Math.min(...vals)-0.5,mx=Math.max(...vals)+0.5;
  const pts=vals.map((v,i)=>({
    x:PL+(i/(vals.length-1))*(W-PL-PR),
    y:PT+(1-(v-mn)/(mx-mn))*(H-PT-PB),
    kg:v,date:weights[i].logged_at
  }));
  let gridHtml='';
  for(let i=0;i<=4;i++){
    const y=PT+i*(H-PT-PB)/4;
    gridHtml+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#E2E8F0" stroke-width="1"/>
    <text x="${PL-4}" y="${y+4}" fill="#6B7280" font-size="9" text-anchor="end" font-family="Space Mono">${(mx-(mx-mn)*i/4).toFixed(1)}</text>`;
  }
  const line=pts.map((p,i)=>i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`).join(' ');
  const area=line+` L${pts[pts.length-1].x},${H-PB} L${PL},${H-PB} Z`;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.innerHTML=`<defs><linearGradient id="aG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0D9488" stop-opacity=".2"/><stop offset="100%" stop-color="#0D9488" stop-opacity="0"/>
  </linearGradient></defs>${gridHtml}
  <path d="${area}" fill="url(#aG)"/>
  <path d="${line}" fill="none" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round"/>
  ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3" fill="#0D9488"/>`).join('')}`;
  const step=Math.max(1,Math.floor(weights.length/5));
  labels.innerHTML=pts.filter((_,i)=>i%step===0||i===pts.length-1)
    .map(p=>`<span>${new Date(p.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})}</span>`).join('');
}

function renderHistory(all) {
  const list=document.getElementById('historyList');
  const sorted=[...all].sort((a,b)=>new Date(b.logged_at)-new Date(a.logged_at));
  if(sorted.length===0){list.innerHTML='<div style="text-align:center;padding:16px;color:var(--muted);font-size:.84rem">Aucune donnée</div>';return;}
  list.innerHTML=sorted.slice(0,30).map((w,i)=>{
    const prev=sorted[i+1];
    let diffHtml='';
    if(prev){const d=(w.weight_kg-prev.weight_kg).toFixed(1);const s=d>0?'+':'';const c=d>0?'up':'down';diffHtml=`<span class="hist-diff ${c}">${s}${d}</span>`;}
    return `<div class="hist-item" data-id="${w.id}">
      <span class="hist-date">${new Date(w.logged_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})}</span>
      <span class="hist-val">${w.weight_kg} kg${diffHtml}</span>
      ${w.notes?`<span class="hist-note">${w.notes}</span>`:'<span class="hist-note"></span>'}
      <div style="display:flex;gap:4px">
        <button class="hist-del" onclick="startEdit('${w.id}',${w.weight_kg},'${w.notes||''}')" title="Modifier" style="background:rgba(13,148,136,.1);color:var(--accent);border:none;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:.8rem">✏️</button>
        <button class="hist-del" onclick="deleteWeight('${w.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function renderBMI(all) {
  const card=document.getElementById('bmiCard');
  if(!heightCm||all.length===0){card.style.display='none';return;}
  card.style.display='block';
  const latest=all[all.length-1];
  const h=heightCm/100;
  const bmi=(latest.weight_kg/(h*h)).toFixed(1);
  let status,color,pct;
  if(bmi<18.5){status='Insuffisance pondérale';color='#3B82F6';pct=Math.max(5,(bmi/40)*100);}
  else if(bmi<25){status='Poids normal ✓';color='var(--accent)';pct=(bmi/40)*100;}
  else if(bmi<30){status='Surpoids';color='var(--accent3)';pct=(bmi/40)*100;}
  else{status='Obésité';color='var(--danger)';pct=Math.min(95,(bmi/40)*100);}
  document.getElementById('bmiContent').innerHTML=`
    <div class="bmi-val" style="color:${color}">${bmi}</div>
    <div class="bmi-bar"><div class="bmi-fill" style="width:${pct}%;background:${color}"></div></div>
    <div class="bmi-labels"><span>16</span><span>18.5</span><span>25</span><span>30</span><span>40</span></div>
    <div class="bmi-status" style="color:${color}">${status}</div>
    <div style="font-size:.72rem;color:var(--muted);margin-top:4px">Taille : ${heightCm} cm · Poids : ${latest.weight_kg} kg</div>`;
}

init();
</script>
</body>
</html>
