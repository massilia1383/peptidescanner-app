<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — PeptideScanner</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="/lang.js"></script>
  <style>
    :root {
      --accent:#0D9488; --accent2:#2B6CB0; --orange:#F97316;
      --bg:#F8F9FA; --surface:#FFFFFF; --border:#E2E8F0;
      --text:#1F2937; --muted:#6B7280; --error:#DC2626; --success:#16A34A;
      --radius:12px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;}
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;text-decoration:none;}
    .logo-icon{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
    .logo-name{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.3px;}
    .logo-name span{color:var(--accent);}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px 36px;width:100%;max-width:420px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);}
    .card-title{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:6px;}
    .card-subtitle{font-size:14px;color:var(--muted);margin-bottom:28px;}
    .tabs{display:flex;background:var(--bg);border-radius:8px;padding:3px;margin-bottom:28px;gap:3px;}
    .tab{flex:1;padding:9px;font-family:inherit;font-size:14px;font-weight:500;color:var(--muted);background:transparent;border:none;border-radius:6px;cursor:pointer;transition:all .18s;}
    .tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08);font-weight:600;}
    .form-group{margin-bottom:16px;}
    label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;}
    input[type="email"],input[type="password"],input[type="text"]{width:100%;padding:11px 14px;font-family:inherit;font-size:15px;color:var(--text);background:var(--bg);border:1.5px solid var(--border);border-radius:8px;outline:none;transition:border-color .18s;}
    input:focus{border-color:var(--accent);}
    input.error{border-color:var(--error);}
    .btn-primary{width:100%;padding:13px;font-family:inherit;font-size:15px;font-weight:600;color:#fff;background:var(--accent);border:none;border-radius:8px;cursor:pointer;margin-top:6px;transition:background .18s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px;}
    .btn-primary:hover{background:#0b7c70;}
    .btn-primary:active{transform:scale(.98);}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none;}
    .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .msg{display:none;padding:12px 14px;border-radius:8px;font-size:14px;margin-bottom:16px;line-height:1.45;}
    .msg.error{background:#FEF2F2;color:var(--error);border:1px solid #FECACA;display:block;}
    .msg.success{background:#F0FDF4;color:var(--success);border:1px solid #BBF7D0;display:block;}
    .forgot{text-align:right;margin-top:4px;}
    .forgot a{font-size:13px;color:var(--accent2);text-decoration:none;}
    .forgot a:hover{text-decoration:underline;}
    .terms{font-size:12px;color:var(--muted);text-align:center;margin-top:16px;line-height:1.5;}
    .terms a{color:var(--accent2);text-decoration:none;}
    #confirmScreen{display:none;text-align:center;padding:12px 0;}
    .confirm-icon{font-size:48px;margin-bottom:16px;}
    .confirm-title{font-size:20px;font-weight:700;margin-bottom:10px;}
    .confirm-text{font-size:14px;color:var(--muted);line-height:1.6;}
    .confirm-email{font-weight:600;color:var(--text);}
    .resend-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:10px 20px;font-family:inherit;font-size:14px;color:var(--text);cursor:pointer;margin-top:20px;transition:border-color .18s;}
    .resend-btn:hover{border-color:var(--accent);color:var(--accent);}
    .back-link{position:fixed;top:16px;left:16px;display:flex;align-items:center;gap:6px;font-size:.82rem;color:var(--muted);text-decoration:none;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:100px;transition:all .2s;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    .back-link:hover{color:var(--accent);border-color:var(--accent);}
    .lang-wrap{position:fixed;top:16px;right:16px;z-index:10;}
  </style>
</head>
<body>

  <a href="/index.html" class="back-link" id="backLink"></a>
  <div class="lang-wrap" id="langToggleBtn"></div>

  <a href="/index.html" class="logo">
    <div class="logo-icon">🧬</div>
    <span class="logo-name">Peptide<span>Scanner</span></span>
  </a>

  <div class="card">
    <div id="confirmScreen">
      <div class="confirm-icon">📬</div>
      <div class="confirm-title" id="confirmTitle"></div>
      <p class="confirm-text" id="confirmText1"></p>
      <p class="confirm-text" style="margin-top:10px;" id="confirmText2"></p>
      <button class="resend-btn" id="resendBtn"></button>
    </div>

    <div id="authForm">
      <div class="card-title" id="formTitle"></div>
      <div class="card-subtitle" id="formSubtitle"></div>
      <div class="tabs">
        <button class="tab active" id="tabLogin" onclick="switchTab('login')"></button>
        <button class="tab" id="tabRegister" onclick="switchTab('register')"></button>
      </div>
      <div class="msg" id="msgBox"></div>
      <div class="form-group">
        <label for="email" id="labelEmail"></label>
        <input type="email" id="email" autocomplete="email" />
      </div>
      <div class="form-group" id="nameGroup" style="display:none;">
        <label for="fullName" id="labelName"></label>
        <input type="text" id="fullName" autocomplete="given-name" />
      </div>
      <div class="form-group">
        <label for="password" id="labelPassword"></label>
        <input type="password" id="password" autocomplete="current-password" />
        <div class="forgot" id="forgotRow">
          <a href="#" onclick="sendPasswordReset(event)" id="forgotLink"></a>
        </div>
      </div>
      <div class="form-group" id="confirmGroup" style="display:none;">
        <label for="passwordConfirm" id="labelConfirmPw"></label>
        <input type="password" id="passwordConfirm" autocomplete="new-password" />
      </div>
      <button class="btn-primary" id="submitBtn" onclick="handleSubmit()"></button>
      <p class="terms" id="termsRow" style="display:none;">
        <span id="termsText"></span>
        <a href="/cgu.html" id="termsCgu"></a> <span id="termsAnd"> et notre </span>
        <a href="/privacy.html" id="termsPrivacy"></a>.
      </p>
    </div>
  </div>

  <script>
    // ── Appliquer les traductions statiques ──────────────────
    function applyLoginI18n() {
      document.getElementById('backLink').textContent  = t('login_back_home');
      document.getElementById('tabLogin').textContent  = t('login_tab_login');
      document.getElementById('tabRegister').textContent = t('login_tab_register');
      document.getElementById('labelEmail').textContent    = t('login_email');
      document.getElementById('labelName').textContent     = t('login_name');
      document.getElementById('labelPassword').textContent = t('login_password');
      document.getElementById('labelConfirmPw').textContent= t('login_confirm_pw');
      document.getElementById('forgotLink').textContent    = t('login_forgot');
      document.getElementById('confirmTitle').textContent  = t('login_confirm_title');
      document.getElementById('confirmText2').textContent  = t('login_confirm_text2');
      document.getElementById('resendBtn').textContent     = t('login_resend');
      document.getElementById('termsText').textContent     = t('login_terms') + ' ';
      document.getElementById('termsCgu').textContent      = t('login_terms_cgu');
      document.getElementById('termsAnd').textContent      = ' ' + (PS_getLang() === 'fr' ? 'et notre' : 'and our') + ' ';
      document.getElementById('termsPrivacy').textContent  = t('login_terms_privacy');
      // Placeholders
      document.getElementById('email').placeholder         = t('login_email_ph');
      document.getElementById('fullName').placeholder      = t('login_name_ph');
      document.getElementById('password').placeholder      = t('login_password_ph');
      document.getElementById('passwordConfirm').placeholder = t('login_confirm_pw_ph');
      // Formulaire titre
      setTabTexts('login');
    }

    function setTabTexts(tab) {
      var isReg = tab === 'register';
      document.getElementById('formTitle').textContent    = isReg ? t('login_register_title')    : t('login_title');
      document.getElementById('formSubtitle').textContent = isReg ? t('login_register_subtitle') : t('login_subtitle');
      document.getElementById('submitBtn').textContent    = isReg ? t('login_register_submit')   : t('login_submit');
    }

    PS_renderLangSwitcher();
    applyLoginI18n();
  </script>

  <script type="module">
    import { signIn, signUp, supabase, migrateLocalStorageToSupabase, formatError } from '/supabase.js';

    (async () => {
      const { data } = await supabase.auth.getSession();
      if (data?.session) window.location.href = '/dashboard.html';
    })();

    window.currentTab = 'login';

    window.switchTab = function(tab) {
      window.currentTab = tab;
      var isRegister = tab === 'register';
      document.getElementById('tabLogin').classList.toggle('active', !isRegister);
      document.getElementById('tabRegister').classList.toggle('active', isRegister);
      document.getElementById('nameGroup').style.display    = isRegister ? 'block' : 'none';
      document.getElementById('confirmGroup').style.display = isRegister ? 'block' : 'none';
      document.getElementById('forgotRow').style.display    = isRegister ? 'none'  : 'block';
      document.getElementById('termsRow').style.display     = isRegister ? 'block' : 'none';
      setTabTexts(tab);
      clearMsg();
    };

    window.handleSubmit = async function() {
      clearMsg();
      var email    = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      if (!email || !password) { showMsg(t('login_fill_fields'), 'error'); return; }
      if (password.length < 6) { showMsg(t('login_pw_short'), 'error'); return; }
      if (window.currentTab === 'register') {
        var confirm = document.getElementById('passwordConfirm').value;
        if (password !== confirm) { showMsg(t('login_pw_mismatch'), 'error'); return; }
      }
      setLoading(true);
      if (window.currentTab === 'login') {
        var { user, error } = await signIn(email, password);
        if (error) { showMsg(formatError(error), 'error'); setLoading(false); return; }
        await migrateLocalStorageToSupabase(user.id);
        window.location.href = '/dashboard.html';
      } else {
        var { user, error } = await signUp(email, password);
        if (error) { showMsg(formatError(error), 'error'); setLoading(false); return; }
        var fullName = document.getElementById('fullName').value.trim();
        if (fullName && user) {
          await supabase.from('profiles').update({ full_name: fullName }).eq('id', user.id);
        }
        setLoading(false);
        showConfirmScreen(email);
      }
    };

    window.sendPasswordReset = async function(e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      if (!email) { showMsg(t('login_reset_email_required'), 'error'); return; }
      var { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/reset-password.html',
      });
      if (error) showMsg(formatError(error), 'error');
      else showMsg(t('login_reset_sent'), 'success');
    };

    window.resendConfirmation = async function() {
      var email = document.getElementById('confirmEmail').textContent;
      var { error } = await supabase.auth.resend({ type: 'signup', email });
      if (!error) {
        document.getElementById('resendBtn').textContent = '✓ ' + t('login_resend');
        document.getElementById('resendBtn').disabled = true;
      }
    };
    document.getElementById('resendBtn').addEventListener('click', window.resendConfirmation);

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') window.handleSubmit();
    });

    function setLoading(loading) {
      var btn = document.getElementById('submitBtn');
      btn.disabled = loading;
      btn.innerHTML = loading ? '<div class="spinner"></div>'
        : (window.currentTab === 'login' ? t('login_submit') : t('login_register_submit'));
    }
    function showMsg(text, type) {
      var box = document.getElementById('msgBox');
      box.textContent = text; box.className = 'msg ' + type;
    }
    function clearMsg() {
      var box = document.getElementById('msgBox');
      box.className = 'msg'; box.textContent = '';
    }
    function showConfirmScreen(email) {
      document.getElementById('authForm').style.display = 'none';
      document.getElementById('confirmScreen').style.display = 'block';
      var p = document.getElementById('confirmText1');
      p.innerHTML = t('login_confirm_text1') + '<br><span class="confirm-email" id="confirmEmail">' + email + '</span>';
    }
  </script>
</body>
</html>
