<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PeptideScanner — Cure</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg:#F8F9FA; --surface:#FFFFFF; --surface2:#F4F6F8; --border:#E2E8F0;
    --accent:#0D9488; --accent2:#2B6CB0; --accent3:#F97316;
    --text:#1F2937; --muted:#6B7280; --danger:#DC2626; --nav-h:64px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Space Grotesk',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:calc(var(--nav-h)+20px); }

  .topbar { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:rgba(248,249,250,.97); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; backdrop-filter:blur(12px); }
  .topbar h1 { font-size:1.1rem; font-weight:700; }
  .topbar-logo { font-family:'Space Mono',monospace; font-size:.85rem; font-weight:700; color:var(--accent); display:flex; align-items:center; gap:6px; }
  .logo-dot { width:6px; height:6px; background:var(--accent); border-radius:50%; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.6)} }
  .add-btn { width:36px; height:36px; background:var(--accent); border-radius:10px; border:none; color:#000; font-size:1.3rem; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:700; transition:opacity .2s; }
  .add-btn:hover { opacity:.85; }

  .content { padding:16px 20px 0; max-width:480px; margin:0 auto; }

  /* CURE SELECTOR */
  .cure-tabs { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:16px; scrollbar-width:none; }
  .cure-tabs::-webkit-scrollbar { display:none; }
  .cure-tab {
    padding:8px 16px; border-radius:100px; border:1px solid var(--border);
    background:var(--surface); color:var(--muted); font-size:.8rem; font-weight:600;
    cursor:pointer; white-space:nowrap; transition:all .2s; flex-shrink:0;
  }
  .cure-tab.active { background:rgba(0,201,167,.12); border-color:rgba(0,201,167,.4); color:var(--accent); }

  /* CURE INFO CARD */
  .cure-info {
    background:var(--surface); border:1px solid var(--border);
    border-radius:18px; padding:18px; margin-bottom:16px;
  }
  .ci-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .ci-name { font-size:1.1rem; font-weight:700; }
  .ci-status {
    padding:4px 10px; border-radius:100px; font-size:.7rem; font-weight:700;
    font-family:'Space Mono',monospace;
  }
  .ci-status.active { background:rgba(0,201,167,.12); color:var(--accent); }
  .ci-status.ended { background:rgba(107,122,153,.1); color:var(--muted); }
  .ci-status.future { background:rgba(99,102,241,.12); color:var(--accent2); }
  .ci-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; }
  .ci-box { background:var(--surface2); border-radius:10px; padding:10px; }
  .ci-box-label { font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:4px; }
  .ci-box-val { font-family:'Space Mono',monospace; font-size:.88rem; font-weight:700; color:var(--accent); }

  /* COMPLIANCE BAR */
  .compliance-row { display:flex; justify-content:space-between; align-items:center; margin-top:14px; margin-bottom:6px; }
  .compliance-row span { font-size:.75rem; color:var(--muted); }
  .compliance-row strong { font-family:'Space Mono',monospace; font-size:.85rem; color:var(--accent); }
  .comp-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
  .comp-fill { height:100%; border-radius:3px; background:linear-gradient(90deg, var(--accent), var(--accent2)); transition:width .5s ease; }

  /* CALENDAR */
  .cal-section { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:18px; margin-bottom:16px; }
  .cal-nav { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .cal-nav button { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); width:32px; height:32px; cursor:pointer; font-size:.9rem; transition:all .2s; }
  .cal-nav button:hover { border-color:var(--accent); color:var(--accent); }
  .cal-month { font-size:.95rem; font-weight:700; font-family:'Space Mono',monospace; }
  .cal-days-header { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:6px; }
  .cal-day-label { text-align:center; font-size:.65rem; color:var(--muted); font-weight:600; padding:4px 0; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
  .cal-day {
    aspect-ratio:1; border-radius:8px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; cursor:pointer;
    font-size:.75rem; font-weight:600; transition:all .15s; position:relative;
    border:1px solid transparent;
  }
  .cal-day.empty { cursor:default; }
  .cal-day.outside { color:var(--border); cursor:default; }
  .cal-day.done { background:rgba(0,201,167,.18); color:var(--accent); border-color:rgba(0,201,167,.2); }
  .cal-day.partial { background:rgba(245,158,11,.12); color:var(--accent3); border-color:rgba(245,158,11,.2); }
  .cal-day.missed { background:rgba(239,68,68,.08); color:var(--danger); border-color:rgba(239,68,68,.15); }
  .cal-day.rest { background:var(--surface2); color:var(--muted); }
  .cal-day.today { border-color:var(--accent) !important; box-shadow:0 0 0 1px rgba(0,201,167,.5); }
  .cal-day.future-day { color:var(--muted); background:var(--surface2); opacity:.5; cursor:default; }
  .day-dot { width:4px; height:4px; border-radius:50%; position:absolute; bottom:4px; }
  .day-dot.green { background:var(--accent); }
  .day-dot.amber { background:var(--accent3); }
  .day-dot.red { background:var(--danger); }

  /* LEGEND */
  .legend { display:flex; gap:12px; flex-wrap:wrap; margin-top:12px; }
  .legend-item { display:flex; align-items:center; gap:5px; font-size:.68rem; color:var(--muted); }
  .legend-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }

  /* DAY DETAIL */
  .day-detail {
    background:var(--surface); border:1px solid var(--border);
    border-radius:18px; padding:18px; margin-bottom:16px;
    display:none;
  }
  .day-detail.show { display:block; }
  .dd-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .dd-date { font-size:.95rem; font-weight:700; }
  .dd-close { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--muted); width:28px; height:28px; cursor:pointer; font-size:.8rem; display:flex; align-items:center; justify-content:center; }
  .inj-slot {
    display:flex; align-items:center; gap:12px; padding:12px;
    background:var(--surface2); border-radius:12px; margin-bottom:8px;
    cursor:pointer; transition:all .2s; border:1px solid var(--border);
  }
  .inj-slot:hover { border-color:rgba(0,201,167,.3); }
  .inj-slot.done { border-color:rgba(0,201,167,.25); background:rgba(0,201,167,.06); }
  .slot-check {
    width:32px; height:32px; border-radius:9px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:.9rem;
    transition:all .2s;
  }
  .slot-check.checked { background:rgba(0,201,167,.15); border:2px solid var(--accent); color:var(--accent); }
  .slot-check.unchecked { background:var(--border); border:2px solid var(--border); color:transparent; }
  .slot-info { flex:1; }
  .slot-name { font-size:.86rem; font-weight:600; }
  .slot-detail { font-size:.72rem; color:var(--muted); margin-top:2px; }
  .slot-time { font-family:'Space Mono',monospace; font-size:.72rem; color:var(--muted); }

  /* NOTES */
  .note-area { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; color:var(--text); font-family:inherit; font-size:.84rem; resize:none; outline:none; margin-top:10px; transition:border-color .2s; }
  .note-area:focus { border-color:var(--accent); }
  .save-note-btn { margin-top:8px; padding:8px 18px; background:var(--accent); color:#000; border:none; border-radius:8px; font-family:inherit; font-size:.8rem; font-weight:700; cursor:pointer; }

  /* STATS SECTION */
  .stats-section { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:18px; margin-bottom:16px; }
  .stats-section h3 { font-size:.82rem; font-weight:700; margin-bottom:14px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; font-family:'Space Mono',monospace; }
  .stat-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(30,45,69,.5); }
  .stat-row:last-child { border-bottom:none; }
  .stat-row-key { font-size:.84rem; color:var(--muted); }
  .stat-row-val { font-family:'Space Mono',monospace; font-size:.88rem; font-weight:700; }

  /* BOTTOM NAV */
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:200; background:rgba(255,255,255,.97); backdrop-filter:blur(16px); border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-around; height:var(--nav-h); padding:0 8px; }
  .nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 14px; border-radius:12px; cursor:pointer; text-decoration:none; color:var(--muted); transition:all .2s; min-width:56px; }
  .nav-item.active { color:var(--accent); }
  .nav-icon { font-size:1.3rem; line-height:1; }
  .nav-label { font-size:.6rem; font-weight:600; letter-spacing:.5px; text-transform:uppercase; }
  .nav-dot { width:4px; height:4px; background:var(--accent); border-radius:50%; margin-top:2px; }

  /* TOAST */
  .toast { position:fixed; bottom:calc(var(--nav-h)+16px); left:50%; transform:translateX(-50%) translateY(20px); background:var(--accent); color:#000; padding:10px 20px; border-radius:100px; font-size:.82rem; font-weight:700; opacity:0; pointer-events:none; transition:all .3s; z-index:300; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:48px 20px; color:var(--muted); }
  .empty-state span { font-size:2.5rem; display:block; margin-bottom:12px; }
  .empty-state p { font-size:.9rem; line-height:1.6; margin-bottom:20px; }
  .empty-btn { background:var(--accent); color:#000; border:none; padding:12px 24px; border-radius:10px; font-family:inherit; font-size:.88rem; font-weight:700; cursor:pointer; }

  /* ADD CURE MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:400; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity .25s; backdrop-filter:blur(4px); }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal-sheet { width:100%; background:var(--surface); border-radius:24px 24px 0 0; padding:24px 20px 40px; transform:translateY(100%); transition:transform .3s; max-width:480px; margin:0 auto; }
  .modal-overlay.open .modal-sheet { transform:translateY(0); }
  .sheet-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
  .sheet-title { font-size:1.1rem; font-weight:700; margin-bottom:20px; }
  .form-group { margin-bottom:14px; }
  .form-label { font-size:.73rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:7px; display:block; }
  .form-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:11px 14px; color:var(--text); font-family:inherit; font-size:.88rem; outline:none; transition:border-color .2s; }
  .form-input:focus { border-color:var(--accent); }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .submit-btn { width:100%; padding:14px; border-radius:12px; border:none; background:var(--accent); color:#000; font-family:inherit; font-size:.95rem; font-weight:700; cursor:pointer; margin-top:6px; }
  .delete-btn { width:100%; padding:12px; border-radius:12px; border:1px solid rgba(239,68,68,.3); background:rgba(239,68,68,.08); color:var(--danger); font-family:inherit; font-size:.88rem; font-weight:700; cursor:pointer; margin-top:8px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo"><div class="logo-dot"></div>PeptideScanner</div>
  <h1>Calendrier de cure</h1>
  <button class="add-btn" onclick="openAddCure()">＋</button>
</div>

<div class="content" id="mainContent">
  <!-- Généré par JS -->
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="dashboard.html"><span class="nav-icon">🏠</span><span class="nav-label">Accueil</span></a>
  <a class="nav-item" href="peptide-database.html"><span class="nav-icon">🧬</span><span class="nav-label">Biblio</span></a>
  <a class="nav-item active" href="cure.html"><span class="nav-icon">📅</span><span class="nav-label">Cure</span><div class="nav-dot"></div></a>
  <a class="nav-item" href="poids.html"><span class="nav-icon">⚖️</span><span class="nav-label">Poids</span></a>
  <a class="nav-item" href="alertes.html"><span class="nav-icon">🔔</span><span class="nav-label">Alertes</span></a>
  <a class="nav-item" href="inventaire.html">
    <span class="nav-icon">🧪</span>
    <span class="nav-label">Stock</span>
  </a>
  <a class="nav-item" href="profil.html"><span class="nav-icon">👤</span><span class="nav-label">Profil</span></a>
</nav>

<div class="modal-overlay" id="addCureModal" onclick="closeIfOverlay(event)">
  <div class="modal-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="modalTitle">Nouvelle cure</div>
    <div class="form-group">
      <label class="form-label">Peptide</label>
      <select class="form-input" id="newCurePeptide">
        <option value="">Choisir…</option>
        <option>BPC-157</option><option>TB-500</option><option>CJC-1295</option>
        <option>Ipamorelin</option><option>GHRP-6</option><option>GHRP-2</option>
        <option>Sermorelin</option><option>Semaglutide</option><option>Tirzepatide</option>
        <option>Epithalon</option><option>Semax</option><option>Selank</option>
        <option>PT-141</option><option>AOD-9604</option><option>Thymosin Alpha-1</option>
        <option>GHK-Cu</option><option>TB-500 + BPC-157</option><option>Autre</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Dosage</label>
        <input class="form-input" id="newCureDosage" placeholder="ex: 250 mcg">
      </div>
      <div class="form-group">
        <label class="form-label">Admin.</label>
        <select class="form-input" id="newCureAdmin">
          <option>SC</option><option>IM</option><option>Oral</option><option>Nasal</option><option>IV</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date de début</label>
        <input class="form-input" id="newCureStart" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">Durée (jours)</label>
        <input class="form-input" id="newCureDuration" type="number" placeholder="30" min="1" max="365">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Fréquence</label>
      <select class="form-input" id="newCureFreq">
        <option value="1">1× par jour</option>
        <option value="2">2× par jour</option>
        <option value="3">3× par jour</option>
        <option value="0.5">1× tous les 2 jours</option>
        <option value="0.28">2× par semaine</option>
        <option value="0.14">1× par semaine</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Notes (optionnel)</label>
      <input class="form-input" id="newCureNotes" placeholder="Objectif, remarques…">
    </div>
    <button class="submit-btn" id="modalSubmit" onclick="saveCure()">Démarrer la cure</button>
    <button class="delete-btn" id="modalDelete" style="display:none" onclick="deleteCure()">Supprimer cette cure</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function getLS(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}}
function setLS(k,v){localStorage.setItem(k,JSON.stringify(v))}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

const TODAY=new Date(); TODAY.setHours(0,0,0,0);
const todayStr=TODAY.toISOString().split('T')[0];
const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS_SHORT=['L','M','M','J','V','S','D'];

let currentCureId = null;
let calYear = TODAY.getFullYear();
let calMonth = TODAY.getMonth();
let editCureId = null;

// ── INIT DEMO DATA ────────────────────────────────────────────────────
function initDemo(){
  if(getLS('pt_cures',[]).length===0){
    const s=new Date(TODAY); s.setDate(s.getDate()-17);
    setLS('pt_cures',[{id:'demo1',peptide:'BPC-157',dosage:'250 mcg',admin:'SC',startDate:s.toISOString().split('T')[0],duration:'30',freq:'2',notes:'Cure récupération genou'}]);
    const logs=[];
    for(let i=0;i<17;i++){const d=new Date(s);d.setDate(d.getDate()+i);const ds=d.toISOString().split('T')[0];if(Math.random()>.1)logs.push({date:ds,slot:0,ts:Date.now()});if(Math.random()>.15)logs.push({date:ds,slot:1,ts:Date.now()});}
    setLS('pt_logs_demo1',logs);
  }
}

// ── RENDER MAIN ───────────────────────────────────────────────────────
function render(){
  const cures=getLS('pt_cures',[]);
  const c=document.getElementById('mainContent');
  if(cures.length===0){
    c.innerHTML=`<div class="empty-state"><span>📅</span><p>Aucune cure enregistrée.<br>Commencez par ajouter votre premier protocole.</p><button class="empty-btn" onclick="openAddCure()">+ Nouvelle cure</button></div>`;
    return;
  }

  if(!currentCureId || !cures.find(x=>x.id===currentCureId)) currentCureId=cures[0].id;

  // Tabs
  const tabs=cures.map(cu=>`<div class="cure-tab ${cu.id===currentCureId?'active':''}" onclick="selectCure('${cu.id}')">${cu.peptide}</div>`).join('');

  const cure=cures.find(x=>x.id===currentCureId);
  const startD=new Date(cure.startDate); startD.setHours(0,0,0,0);
  const endD=new Date(startD); endD.setDate(endD.getDate()+parseInt(cure.duration));
  const dayNum=Math.max(1,Math.floor((TODAY-startD)/86400000)+1);
  const daysLeft=Math.max(0,Math.ceil((endD-TODAY)/86400000));
  const logs=getLS('pt_logs_'+currentCureId,[]);
  const freq=parseFloat(cure.freq);
  const totalExpected=Math.round(Math.min(dayNum, parseInt(cure.duration)) * freq);
  const done=logs.length;
  const compPct=totalExpected>0?Math.min(100,Math.round(done/totalExpected*100)):0;
  let status='active', statusLabel='En cours';
  if(endD<TODAY){status='ended';statusLabel='Terminée';}
  else if(startD>TODAY){status='future';statusLabel='À venir';}

  c.innerHTML=`
    <div class="cure-tabs">${tabs}</div>
    <div class="cure-info">
      <div class="ci-header">
        <div class="ci-name">${cure.peptide}</div>
        <div class="ci-status ${status}">${statusLabel}</div>
      </div>
      <div class="ci-grid">
        <div class="ci-box"><div class="ci-box-label">Dosage</div><div class="ci-box-val">${cure.dosage}</div></div>
        <div class="ci-box"><div class="ci-box-label">Admin.</div><div class="ci-box-val">${cure.admin}</div></div>
        <div class="ci-box"><div class="ci-box-label">Durée</div><div class="ci-box-val">${cure.duration}j</div></div>
        <div class="ci-box"><div class="ci-box-label">Début</div><div class="ci-box-val">${formatD(startD)}</div></div>
        <div class="ci-box"><div class="ci-box-label">Fin</div><div class="ci-box-val">${formatD(endD)}</div></div>
        <div class="ci-box"><div class="ci-box-label">Restant</div><div class="ci-box-val" style="color:${daysLeft<=5?'var(--danger)':'var(--accent)'}">${daysLeft}j</div></div>
      </div>
      <div class="compliance-row"><span>Compliance</span><strong>${compPct}%</strong></div>
      <div class="comp-bar"><div class="comp-fill" style="width:${compPct}%"></div></div>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button style="flex:1;padding:9px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:inherit;font-size:.78rem;cursor:pointer;" onclick="openEditCure('${cure.id}')">✏️ Modifier</button>
      </div>
    </div>
    <div class="cal-section" id="calSection"></div>
    <div class="day-detail" id="dayDetail"></div>
    <div class="stats-section">
      <h3>Statistiques</h3>
      <div class="stat-row"><span class="stat-row-key">Injections faites</span><span class="stat-row-val" style="color:var(--accent)">${done}</span></div>
      <div class="stat-row"><span class="stat-row-key">Injections attendues</span><span class="stat-row-val">${totalExpected}</span></div>
      <div class="stat-row"><span class="stat-row-key">Injections manquées</span><span class="stat-row-val" style="color:var(--danger)">${Math.max(0,totalExpected-done)}</span></div>
      <div class="stat-row"><span class="stat-row-key">Jour actuel</span><span class="stat-row-val">J${Math.min(dayNum,parseInt(cure.duration))}</span></div>
      <div class="stat-row"><span class="stat-row-key">Fréquence</span><span class="stat-row-val">${freq>=1?freq+'×/j':'1×/'+Math.round(1/freq)+'j'}</span></div>
      ${cure.notes?`<div class="stat-row"><span class="stat-row-key">Notes</span><span class="stat-row-val" style="font-family:inherit;font-size:.8rem;color:var(--muted);max-width:180px;text-align:right">${cure.notes}</span></div>`:''}
    </div>
  `;
  renderCalendar();
}

function formatD(d){return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})}

// ── CALENDAR ──────────────────────────────────────────────────────────
function renderCalendar(){
  const cure=getLS('pt_cures',[]).find(x=>x.id===currentCureId);
  if(!cure) return;
  const startD=new Date(cure.startDate); startD.setHours(0,0,0,0);
  const endD=new Date(startD); endD.setDate(endD.getDate()+parseInt(cure.duration));
  const logs=getLS('pt_logs_'+currentCureId,[]);
  const freq=parseFloat(cure.freq);
  const inj_per_day=freq>=1?Math.ceil(freq):1;

  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  let startDow=(firstDay.getDay()+6)%7; // Lundi=0

  const cal=document.getElementById('calSection');
  if(!cal) return;

  let daysHtml='';
  // Empty cells
  for(let i=0;i<startDow;i++) daysHtml+=`<div class="cal-day empty"></div>`;

  for(let d=1;d<=lastDay.getDate();d++){
    const date=new Date(calYear,calMonth,d); date.setHours(0,0,0,0);
    const ds=date.toISOString().split('T')[0];
    const isToday=ds===todayStr;
    const inCure=date>=startD && date<endD;
    const isFuture=date>TODAY;

    let cls='cal-day', dot='';
    if(!inCure){ cls+=' outside'; }
    else if(isFuture){ cls+=' future-day'; }
    else {
      const dayLogs=logs.filter(l=>l.date===ds);
      const doneCt=dayLogs.length;
      if(freq<1){
        // Pas tous les jours — vérifier si jour d'injection
        const dayIndex=Math.floor((date-startD)/86400000);
        const interval=Math.round(1/freq);
        const isInjDay=dayIndex%interval===0;
        if(isInjDay){
          cls+=doneCt>=1?' done':' missed';
          dot=doneCt>=1?'green':'red';
        } else { cls+=' rest'; }
      } else {
        if(doneCt>=inj_per_day){ cls+=' done'; dot='green'; }
        else if(doneCt>0){ cls+=' partial'; dot='amber'; }
        else { cls+=' missed'; dot='red'; }
      }
    }
    if(isToday) cls+=' today';

    daysHtml+=`<div class="${cls}" onclick="selectDay('${ds}',${inCure&&!isFuture})">${d}${dot?`<div class="day-dot ${dot}"></div>`:''}</div>`;
  }

  cal.innerHTML=`
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <div class="cal-month">${MONTHS[calMonth]} ${calYear}</div>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-days-header">${DAYS_SHORT.map(d=>`<div class="cal-day-label">${d}</div>`).join('')}</div>
    <div class="cal-grid">${daysHtml}</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:rgba(0,201,167,.25)"></div>Fait</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(245,158,11,.2)"></div>Partiel</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(239,68,68,.15)"></div>Manqué</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--surface2)"></div>Repos</div>
    </div>`;
}

function changeMonth(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  renderCalendar();
}

// ── DAY DETAIL ────────────────────────────────────────────────────────
function selectDay(ds, clickable){
  const dd=document.getElementById('dayDetail');
  if(!clickable){ dd.classList.remove('show'); return; }

  const cure=getLS('pt_cures',[]).find(x=>x.id===currentCureId);
  if(!cure) return;
  const logs=getLS('pt_logs_'+currentCureId,[]);
  const freq=parseFloat(cure.freq);
  const inj_per_day=freq>=1?Math.ceil(freq):1;
  const times=inj_per_day===1?['08:00']:inj_per_day===2?['08:00','20:00']:['07:00','13:00','20:00'];
  const date=new Date(ds);
  const dateLabel=date.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  const notes=getLS('pt_notes_'+currentCureId+'_'+ds,'');

  let slotsHtml='';
  if(freq<1){
    const startD=new Date(cure.startDate);startD.setHours(0,0,0,0);
    const dayIndex=Math.floor((date-startD)/86400000);
    const interval=Math.round(1/freq);
    const isInjDay=dayIndex%interval===0;
    if(!isInjDay){
      slotsHtml='<div style="text-align:center;padding:12px;color:var(--muted);font-size:.84rem">Jour de repos 😴</div>';
    } else {
      const done=logs.some(l=>l.date===ds&&l.slot===0);
      slotsHtml=`<div class="inj-slot ${done?'done':''}" onclick="toggleInj('${ds}',0,'${times[0]}')"><div class="slot-check ${done?'checked':'unchecked'}">${done?'✓':''}</div><div class="slot-info"><div class="slot-name">${cure.peptide}</div><div class="slot-detail">${cure.dosage} · ${cure.admin}</div></div><div class="slot-time">${times[0]}</div></div>`;
    }
  } else {
    times.forEach((t,i)=>{
      const done=logs.some(l=>l.date===ds&&l.slot===i);
      slotsHtml+=`<div class="inj-slot ${done?'done':''}" onclick="toggleInj('${ds}',${i},'${t}')"><div class="slot-check ${done?'checked':'unchecked'}">${done?'✓':''}</div><div class="slot-info"><div class="slot-name">${cure.peptide} · #${i+1}</div><div class="slot-detail">${cure.dosage} · ${cure.admin}</div></div><div class="slot-time">${t}</div></div>`;
    });
  }

  // Widget rotation sites (seulement si admin SC/IM/IV)
  const showSiteWidget = cure.admin && cure.admin !== 'Oral' && cure.admin !== 'Nasal';
  const siteWidgetHtml = showSiteWidget ? renderSiteWidget(currentCureId, cure.admin, ds) : '';

  dd.innerHTML=`
    <div class="dd-header">
      <div class="dd-date">${dateLabel}</div>
      <button class="dd-close" onclick="document.getElementById('dayDetail').classList.remove('show')">✕</button>
    </div>
    ${siteWidgetHtml}
    ${slotsHtml}
    <textarea class="note-area" id="dayNote" rows="2" placeholder="Note pour ce jour…">${notes}</textarea>
    <button class="save-note-btn" onclick="saveNote('${ds}')">Enregistrer la note</button>`;

  dd.classList.add('show');
  dd.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── ROTATION SITES D'INJECTION ───────────────────────────────────────
const SITES_SC = [
  { id:'abd_g',  label:'Abdomen gauche',   icon:'🫃', zone:'Abdomen' },
  { id:'abd_d',  label:'Abdomen droit',    icon:'🫃', zone:'Abdomen' },
  { id:'cuisse_g', label:'Cuisse gauche',  icon:'🦵', zone:'Cuisse' },
  { id:'cuisse_d', label:'Cuisse droite',  icon:'🦵', zone:'Cuisse' },
  { id:'fesse_g',  label:'Fesse gauche',   icon:'🍑', zone:'Fesse' },
  { id:'fesse_d',  label:'Fesse droite',   icon:'🍑', zone:'Fesse' },
];
const SITES_IM = [
  { id:'deltoid_g', label:'Deltoïde gauche',  icon:'💪', zone:'Épaule' },
  { id:'deltoid_d', label:'Deltoïde droit',   icon:'💪', zone:'Épaule' },
  { id:'quad_g',    label:'Quadriceps gauche',icon:'🦵', zone:'Cuisse' },
  { id:'quad_d',    label:'Quadriceps droit', icon:'🦵', zone:'Cuisse' },
  { id:'fesse_g',   label:'Fesse gauche',     icon:'🍑', zone:'Fesse' },
  { id:'fesse_d',   label:'Fesse droite',     icon:'🍑', zone:'Fesse' },
];
const SITES_IV = [
  { id:'ac_g', label:'Avant-bras gauche', icon:'💉', zone:'Bras' },
  { id:'ac_d', label:'Avant-bras droit',  icon:'💉', zone:'Bras' },
  { id:'saig_g', label:'Saignée gauche',  icon:'💉', zone:'Bras' },
  { id:'saig_d', label:'Saignée droite',  icon:'💉', zone:'Bras' },
];

function getSitesForAdmin(admin) {
  if (!admin) return SITES_SC;
  const a = admin.toUpperCase();
  if (a === 'IM') return SITES_IM;
  if (a === 'IV') return SITES_IV;
  return SITES_SC; // SC, SQ, Oral → SC par défaut
}

function getNextSite(cureId, admin) {
  const sites = getSitesForAdmin(admin);
  const lastIdx = getLS('pt_site_idx_' + cureId, -1);
  const nextIdx = (lastIdx + 1) % sites.length;
  return { site: sites[nextIdx], idx: nextIdx, sites };
}

function recordSite(cureId, siteIdx) {
  setLS('pt_site_idx_' + cureId, siteIdx);
}

function getSiteHistory(cureId, admin) {
  const logs = getLS('pt_logs_' + cureId, []);
  return logs.filter(l => l.site).slice(-6).reverse();
}

function renderSiteWidget(cureId, admin, ds) {
  const { site, idx, sites } = getNextSite(cureId, admin);
  const history = getSiteHistory(cureId, admin);
  const lastUsed = getLS('pt_site_idx_' + cureId, -1);

  const historyHtml = history.length ? `
    <div style="margin-top:8px">
      <div style="font-size:.64rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Derniers sites utilisés</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${history.map(l => `<span style="font-size:.68rem;background:var(--surface2);border-radius:6px;padding:3px 7px;color:var(--muted)">${l.siteLabel||l.site}</span>`).join('')}
      </div>
    </div>` : '';

  const siteDotsHtml = sites.map((s, i) => {
    const isNext = i === idx;
    const isLast = i === lastUsed;
    return `<div title="${s.label}" style="
      width:10px;height:10px;border-radius:50%;flex-shrink:0;
      background:${isNext ? 'var(--accent)' : isLast ? 'rgba(13,148,136,.3)' : 'var(--border)'};
      border:${isNext ? '2px solid var(--accent)' : '1.5px solid transparent'};
      transition:background .2s;
    "></div>`;
  }).join('');

  return `<div id="siteWidget_${ds}" style="
    background:rgba(13,148,136,.05);border:1.5px solid rgba(13,148,136,.18);
    border-radius:14px;padding:12px 14px;margin:10px 0;
  ">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600">Site suggéré</div>
      <button onclick="cycleSite('${cureId}','${ds}')" style="
        font-size:.68rem;color:var(--accent);background:none;border:none;cursor:pointer;
        font-family:inherit;font-weight:600;padding:2px 6px;
      ">Changer →</button>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:1.6rem">${site.icon}</span>
      <div style="flex:1">
        <div style="font-size:.92rem;font-weight:700;color:var(--text)">${site.label}</div>
        <div style="font-size:.7rem;color:var(--muted);margin-top:2px">Zone : ${site.zone}</div>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;max-width:80px;justify-content:flex-end">
        ${siteDotsHtml}
      </div>
    </div>
    ${historyHtml}
  </div>`;
}

function cycleSite(cureId, ds) {
  const cure = getLS('pt_cures', []).find(x => x.id === cureId);
  if (!cure) return;
  const sites = getSitesForAdmin(cure.admin);
  const currentIdx = getLS('pt_site_idx_' + cureId, -1);
  const nextIdx = (currentIdx + 1) % sites.length;
  setLS('pt_site_idx_' + cureId, nextIdx - 1 < 0 ? sites.length - 1 : nextIdx - 1);
  // Re-render le detail du jour
  selectDay(ds, true);
}


function toggleInj(ds, slot, time, siteId, siteLabel){
  const logs=getLS('pt_logs_'+currentCureId,[]);
  const idx=logs.findIndex(l=>l.date===ds&&l.slot===slot);
  const cure=getLS('pt_cures',[]).find(x=>x.id===currentCureId);
  if(idx>=0){
    logs.splice(idx,1);
    showToast('Injection annulée');
  } else {
    if(!siteId && cure) {
      const { site, idx: sIdx } = getNextSite(currentCureId, cure.admin);
      siteId = site.id; siteLabel = site.label;
      recordSite(currentCureId, sIdx);
    }
    logs.push({date:ds,slot,time,ts:Date.now(),site:siteId,siteLabel});
    showToast('✓ Injection — ' + (siteLabel||''));
  }
  setLS('pt_logs_'+currentCureId,logs);
  render();
  setTimeout(()=>selectDay(ds,true),50);
}

function saveNote(ds){
  const note=document.getElementById('dayNote').value;
  setLS('pt_notes_'+currentCureId+'_'+ds, note);
  showToast('✓ Note enregistrée');
}

// ── CURE MANAGEMENT ───────────────────────────────────────────────────
function selectCure(id){ currentCureId=id; calMonth=TODAY.getMonth(); calYear=TODAY.getFullYear(); render(); }

function openAddCure(){
  editCureId=null;
  document.getElementById('modalTitle').textContent='Nouvelle cure';
  document.getElementById('modalSubmit').textContent='Démarrer la cure';
  document.getElementById('modalDelete').style.display='none';
  document.getElementById('newCurePeptide').value='';
  document.getElementById('newCureDosage').value='';
  document.getElementById('newCureAdmin').value='SC';
  document.getElementById('newCureStart').value=todayStr;
  document.getElementById('newCureDuration').value='';
  document.getElementById('newCureFreq').value='1';
  document.getElementById('newCureNotes').value='';
  document.getElementById('addCureModal').classList.add('open');
  document.body.style.overflow='hidden';
}

function openEditCure(id){
  const cure=getLS('pt_cures',[]).find(x=>x.id===id);
  if(!cure) return;
  editCureId=id;
  document.getElementById('modalTitle').textContent='Modifier la cure';
  document.getElementById('modalSubmit').textContent='Enregistrer';
  document.getElementById('modalDelete').style.display='block';
  document.getElementById('newCurePeptide').value=cure.peptide;
  document.getElementById('newCureDosage').value=cure.dosage;
  document.getElementById('newCureAdmin').value=cure.admin;
  document.getElementById('newCureStart').value=cure.startDate;
  document.getElementById('newCureDuration').value=cure.duration;
  document.getElementById('newCureFreq').value=cure.freq;
  document.getElementById('newCureNotes').value=cure.notes||'';
  document.getElementById('addCureModal').classList.add('open');
  document.body.style.overflow='hidden';
}

function saveCure(){
  const peptide=document.getElementById('newCurePeptide').value;
  const dosage=document.getElementById('newCureDosage').value;
  const admin=document.getElementById('newCureAdmin').value;
  const startDate=document.getElementById('newCureStart').value;
  const duration=document.getElementById('newCureDuration').value;
  const freq=document.getElementById('newCureFreq').value;
  const notes=document.getElementById('newCureNotes').value;
  if(!peptide||!dosage||!startDate||!duration){showToast('⚠️ Remplir tous les champs');return;}
  const cures=getLS('pt_cures',[]);
  if(editCureId){
    const idx=cures.findIndex(x=>x.id===editCureId);
    if(idx>=0) cures[idx]={...cures[idx],peptide,dosage,admin,startDate,duration,freq,notes};
    showToast('✓ Cure mise à jour');
  } else {
    const newCure={id:Date.now().toString(),peptide,dosage,admin,startDate,duration,freq,notes};
    cures.push(newCure);
    currentCureId=newCure.id;
    showToast('✓ Cure démarrée !');
  }
  setLS('pt_cures',cures);
  closeModal();
  render();
}

function deleteCure(){
  if(!editCureId) return;
  if(!confirm('Supprimer cette cure et toutes ses données ?')) return;
  let cures=getLS('pt_cures',[]);
  cures=cures.filter(x=>x.id!==editCureId);
  setLS('pt_cures',cures);
  localStorage.removeItem('pt_logs_'+editCureId);
  currentCureId=cures.length>0?cures[0].id:null;
  closeModal();
  showToast('Cure supprimée');
  render();
}

function closeModal(){ document.getElementById('addCureModal').classList.remove('open'); document.body.style.overflow=''; }
function closeIfOverlay(e){ if(e.target===document.getElementById('addCureModal')) closeModal(); }

initDemo();
render();
</script>
