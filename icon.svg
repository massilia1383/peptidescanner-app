<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond principal -->
  <rect width="512" height="512" rx="110" fill="#0A0F1E"/>

  <!-- Fond intérieur -->
  <rect x="32" y="32" width="448" height="448" rx="90" fill="#111827"/>

  <!-- Cercle accent -->
