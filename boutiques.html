var currentCat = 'all';
var currentSearch = '';

// ── RENDER ────────────────────────────────────────────────────────────
function renderShops() {
  var list = document.getElementById('shopsList');
  var noRes = document.getElementById('noResults');
  var search = currentSearch.toLowerCase();
  var lang = PS_getLang();
  var count = 0;

  list.innerHTML = SHOPS.map(function(shop) {
    var matchCat = currentCat === 'all'
      || (currentCat === 'eu' && (shop.origin.includes('🇪🇺') || shop.origin.includes('🇫🇷') || shop.origin.includes('🇩🇪') || shop.origin.includes('🇧🇪') || shop.origin.includes('🇳🇱')))
      || (currentCat === 'fr' && shop.origin.includes('🇫🇷'))
      || (currentCat === 'promo' && shop.promo)
      || shop.cats.includes(currentCat);

    var desc = lang === 'en' ? shop.desc_en : shop.desc_fr;
    var matchSearch = !search || shop.name.toLowerCase().includes(search) || desc.toLowerCase().includes(search)
      || (shop.peptides && shop.peptides.some(function(p){return p.toLowerCase().includes(search);}))
      || (shop.materiel && shop.materiel.some(function(m){return m.toLowerCase().includes(search);}));

    if (!matchCat || !matchSearch) return '';
    count++;

    var stars = '★'.repeat(Math.floor(shop.rating));
    var tagsHtml = shop.tags.map(function(tag) {
      return '<span class="shop-tag ' + tag + '">' + t('shops_tag_' + tag) + '</span>';
    }).join('');

    var promoHtml = shop.promo ? '<div class="promo-row"><span class="promo-label">' + t('shops_promo_label') + '</span><span class="promo-code">' + shop.promo.code + '</span><span class="promo-disc">' + shop.promo.discount + '</span><button class="copy-btn" onclick="copyCode(event,\'' + shop.promo.code + '\')">' + t('shops_copy') + '</button></div>' : '';

    var catsHtml = shop.cats.map(function(c) {
      var cls = {peptides:'green',materiel:'amber',testing:'purple'};
      return '<span class="shop-cat ' + cls[c] + '">' + t('shops_cat_' + c) + '</span>';
    }).join('');

    return '<div class="shop-card" id="shop-' + shop.id + '" onclick="openShop(' + shop.id + ')">'
      + '<div class="shop-header"><div class="shop-logo" style="background:var(--surface2)">' + shop.emoji + '</div>'
      + '<div class="shop-meta"><div class="shop-name-row"><span class="shop-name">' + shop.name + '</span>'
      + (shop.verified ? '<div class="verified-badge">' + t('shops_verified') + '</div>' : '')
      + '</div><div class="shop-origin">' + shop.origin + '</div>'
      + '<div class="shop-tags">' + tagsHtml + '</div>'
      + '<div class="shop-rating"><span class="stars">' + stars + '</span><span class="rating-val">' + shop.rating + '</span><span class="rating-count">(' + shop.reviews + ')</span></div>'
      + '</div></div>'
      + '<div class="shop-body"><div class="shop-desc">' + desc.substring(0,100) + '…</div>'
      + '<div class="shop-cats">' + catsHtml + '</div>' + promoHtml + '</div>'
      + '<div class="delivery-row">'
      + '<div class="del-item">🚚 <span>' + shop.delivery.delai + '</span></div>'
      + (shop.delivery.franco ? '<div class="del-item">📦 <span>' + shop.delivery.franco + '</span></div>' : '')
      + '<div class="del-item">🌍 <span>' + shop.delivery.pays + '</span></div>'
      + '</div>'
      + '<div class="shop-footer">'
      + '<a class="shop-btn primary" href="' + shop.url + '" target="_blank" onclick="trackClick(event,' + shop.id + ')">' + t('shops_visit') + '</a>'
      + '<button class="shop-btn secondary" onclick="openShop(' + shop.id + ');event.stopPropagation()">' + t('shops_details') + '</button>'
      + '</div></div>';
  }).join('');

  noRes.style.display = count === 0 ? 'block' : 'none';
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.filter-chip').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderShops();
}

function filterShops() {
  currentSearch = document.getElementById('searchInput').value;
  renderShops();
}

// ── SHOP MODAL ────────────────────────────────────────────────────────
function openShop(id) {
  var shop = SHOPS.find(function(s){return s.id===id;});
  if (!shop) return;
  var lang = PS_getLang();
  var desc = lang === 'en' ? shop.desc_en : shop.desc_fr;
  var note = lang === 'en' ? shop.note_en : shop.note_fr;
  var stars = '★'.repeat(Math.floor(shop.rating));

  var pepHtml = shop.peptides && shop.peptides.length ? '<div class="modal-section"><h4>' + t('shops_modal_peptides') + '</h4><div class="peptide-list">' + shop.peptides.map(function(p){return '<span class="pep-pill">'+p+'</span>';}).join('') + '</div></div>' : '';
  var matHtml = shop.materiel ? '<div class="modal-section"><h4>' + t('shops_modal_materiel') + '</h4><div class="peptide-list">' + shop.materiel.map(function(m){return '<span class="pep-pill" style="color:var(--accent3);background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.2)">'+m+'</span>';}).join('') + '</div></div>' : '';
  var svcHtml = shop.services ? '<div class="modal-section"><h4>' + t('shops_modal_services') + '</h4><div class="peptide-list">' + shop.services.map(function(s){return '<span class="pep-pill" style="color:var(--accent2);background:rgba(99,102,241,.08);border-color:rgba(99,102,241,.2)">'+s+'</span>';}).join('') + '</div></div>' : '';
  var promoDesc = shop.promo ? (lang === 'en' ? shop.promo.desc_en : shop.promo.desc_fr) : '';
  var promoHtml = shop.promo ? '<div class="modal-section"><h4>' + t('shops_modal_promo') + '</h4><div class="promo-row"><span class="promo-code">'+shop.promo.code+'</span><span class="promo-disc">'+shop.promo.discount+'</span><button class="copy-btn" onclick="copyCode(event,\''+shop.promo.code+'\')">'+t('shops_copy')+'</button></div><div style="font-size:.72rem;color:var(--muted);margin-top:6px">'+promoDesc+'</div></div>' : '';

  document.getElementById('shopModalContent').innerHTML =
    '<div class="sheet-handle"></div>'
    + '<div class="modal-shop-logo" style="background:var(--surface2)">' + shop.emoji + '</div>'
    + '<div class="modal-shop-name">' + shop.name + (shop.verified ? ' <span style="font-size:.7rem;color:var(--accent)">✓</span>' : '') + '</div>'
    + '<div class="modal-shop-origin">' + shop.origin + '</div>'
    + '<div style="display:flex;justify-content:center;align-items:center;gap:6px;margin-bottom:20px"><span style="color:var(--gold)">' + stars + '</span><span style="font-family:Space Mono,monospace;font-weight:700;color:var(--gold)">' + shop.rating + '</span><span style="font-size:.72rem;color:var(--muted)">(' + shop.reviews + ')</span></div>'
    + '<div class="modal-section"><h4>' + t('shops_modal_about') + '</h4><p style="font-size:.84rem;color:var(--muted);line-height:1.6">' + desc + '</p></div>'
    + '<div class="modal-section"><h4>' + t('shops_modal_delivery') + '</h4>'
    + '<div class="info-row"><span class="info-key">' + t('shops_delivery_delay') + '</span><span class="info-val">' + shop.delivery.delai + '</span></div>'
    + (shop.delivery.franco ? '<div class="info-row"><span class="info-key">' + t('shops_delivery_franco') + '</span><span class="info-val">' + shop.delivery.franco + '</span></div>' : '')
    + '<div class="info-row"><span class="info-key">' + t('shops_delivery_zone') + '</span><span class="info-val">' + shop.delivery.pays + '</span></div>'
    + '<div class="info-row"><span class="info-key">Statut</span><span class="info-val" style="color:' + (shop.verified ? 'var(--accent)' : 'var(--accent3)') + '">' + (shop.verified ? t('shops_modal_status_ok') : t('shops_modal_status_no')) + '</span></div>'
    + '</div>'
    + pepHtml + matHtml + svcHtml + promoHtml
    + '<div class="modal-section"><h4>' + t('shops_modal_note') + '</h4><p style="font-size:.8rem;color:var(--muted);font-style:italic">' + note + '</p></div>'
    + '<a class="big-cta" href="' + shop.url + '" target="_blank" onclick="trackClick(event,' + shop.id + ')" style="display:block;text-align:center;text-decoration:none;color:#000">' + t('shops_modal_visit') + ' ' + shop.name + ' →</a>'
    + '<button style="width:100%;padding:11px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;font-size:.86rem;cursor:pointer;margin-top:8px" onclick="closeShopModal()">' + t('shops_modal_close') + '</button>';

  document.getElementById('shopModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeShopModal(){document.getElementById('shopModal').classList.remove('open');document.body.style.overflow='';}
function closeIfOverlay(e){if(e.target===document.getElementById('shopModal'))closeShopModal();}

// ── PARTNER MODAL ─────────────────────────────────────────────────────
function openPartnerForm() {
  document.getElementById('partnerSheet').innerHTML =
    '<div class="sheet-handle"></div>'
    + '<div style="font-size:1.1rem;font-weight:700;margin-bottom:8px">' + t('shops_partner_modal_title') + '</div>'
    + '<div style="font-size:.82rem;color:var(--muted);margin-bottom:20px;line-height:1.6">' + t('shops_partner_modal_sub') + '</div>'
    + '<div class="form-field"><label>' + t('shops_partner_name') + '</label><input id="pName" placeholder="Ex: PurePeptides EU"></div>'
    + '<div class="form-field"><label>' + t('shops_partner_url') + '</label><input id="pUrl" placeholder="https://votre-boutique.com"></div>'
    + '<div class="form-field"><label>' + t('shops_partner_email') + '</label><input type="email" id="pEmail" placeholder="contact@boutique.com"></div>'
    + '<div class="form-field"><label>' + t('shops_partner_country') + '</label><select id="pCountry"><option>France</option><option>Europe (UE)</option><option>International</option><option>USA</option></select></div>'
    + '<button style="width:100%;padding:13px;border-radius:12px;border:none;background:var(--accent2);color:#fff;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer" onclick="submitPartner()">' + t('shops_partner_send') + '</button>'
    + '<button style="width:100%;padding:11px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;font-size:.86rem;cursor:pointer;margin-top:8px" onclick="closePartnerModal()">' + t('shops_partner_cancel') + '</button>';
  document.getElementById('partnerModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closePartnerModal(){document.getElementById('partnerModal').classList.remove('open');document.body.style.overflow='';}
function closePartnerIfOverlay(e){if(e.target===document.getElementById('partnerModal'))closePartnerModal();}
function submitPartner(){
  if(!document.getElementById('pName').value||!document.getElementById('pUrl').value||!document.getElementById('pEmail').value){showToast(t('shops_partner_fill'));return;}
  closePartnerModal();
  showToast(t('shops_partner_sent'));
}

// ── UTILS ─────────────────────────────────────────────────────────────
function trackClick(event, shopId){
  event.stopPropagation();
  var shop = SHOPS.find(function(s){return s.id===shopId;});
  if (!shop) return;
  var clicks = JSON.parse(localStorage.getItem('pt_affil_clicks')||'{}');
  clicks[shopId] = (clicks[shopId]||0)+1;
  localStorage.setItem('pt_affil_clicks',JSON.stringify(clicks));
  showToast(t('shops_open_toast') + ' ' + shop.name + ' 🔗');
}

function copyCode(event, code){
  event.stopPropagation();
  navigator.clipboard.writeText(code).then(function(){showToast(t('shops_copied_toast') + ' "' + code + '"');}).catch(function(){showToast('Code: '+code);});
}

renderShops();
</script>
