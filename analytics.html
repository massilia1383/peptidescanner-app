<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg:#F8F9FA; --surface:#FFFFFF; --surface2:#F4F6F8; --border:#E2E8F0;
    --accent:#0D9488; --accent2:#2B6CB0; --accent3:#F97316;
    --text:#1F2937; --muted:#6B7280; --danger:#DC2626;
    --green:#22C55E; --nav-h:64px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Space Grotesk',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:120px; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; box-shadow:0 1px 8px rgba(0,0,0,.06); }
  .topbar-logo { font-family:'Space Mono',monospace; font-size:.85rem; font-weight:700; color:var(--accent); display:flex; align-items:center; gap:6px; }
  .logo-dot { width:6px; height:6px; background:var(--accent); border-radius:50%; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.6)} }
  .topbar h1 { font-size:1.05rem; font-weight:700; }
  .topbar-right { display:flex; align-items:center; gap:10px; }
  .period-select { background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:6px 10px; font-family:inherit; font-size:.75rem; outline:none; cursor:pointer; }
  .content { padding:16px 20px 0; max-width:480px; margin:0 auto; }
  .scan-score-card { background:linear-gradient(135deg, rgba(13,148,136,.07) 0%, rgba(43,108,176,.05) 100%); border:1.5px solid rgba(13,148,136,.2); border-radius:22px; padding:24px 20px; margin-bottom:16px; position:relative; overflow:hidden; box-shadow:0 4px 20px rgba(13,148,136,.06); }
  .score-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; }
  .score-label { font-size:.68rem; color:var(--accent); text-transform:uppercase; letter-spacing:2px; font-family:'Space Mono',monospace; margin-bottom:4px; }
  .score-title { font-size:1rem; font-weight:700; }
  .score-ring-wrap { position:relative; width:80px; height:80px; flex-shrink:0; }
  .score-ring-wrap svg { transform:rotate(-90deg); }
  .score-ring-bg { fill:none; stroke:var(--border); stroke-width:6; }
  .score-ring-fill { fill:none; stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset .8s ease; }
  .score-number { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:'Space Mono',monospace; }
  .score-num { font-size:1.4rem; font-weight:700; line-height:1; }
  .score-max { font-size:.6rem; color:var(--muted); }
  .score-breakdown { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:4px; }
  .score-item { background:rgba(255,255,255,.7); border:1px solid rgba(13,148,136,.12); border-radius:10px; padding:10px 8px; text-align:center; }
  .score-item-val { font-family:'Space Mono',monospace; font-size:1rem; font-weight:700; margin-bottom:3px; }
  .score-item-label { font-size:.62rem; color:var(--muted); }
  .insights-wrap { margin-bottom:16px; }
  .insight-card { background:var(--surface); border-radius:16px; padding:14px 16px; margin-bottom:10px; display:flex; align-items:flex-start; gap:12px; border:1px solid var(--border); }
  .insight-card.positive { border-left:3px solid var(--accent); }
  .insight-card.warning { border-left:3px solid var(--accent3); }
  .insight-card.negative { border-left:3px solid var(--danger); }
  .insight-card.info { border-left:3px solid var(--accent2); }
  .insight-icon { font-size:1.3rem; flex-shrink:0; margin-top:1px; }
  .insight-body { flex:1; }
  .insight-title { font-size:.86rem; font-weight:700; margin-bottom:3px; }
  .insight-text { font-size:.76rem; color:var(--muted); line-height:1.5; }
  .insight-badge { display:inline-block; margin-top:6px; padding:2px 8px; border-radius:100px; font-size:.65rem; font-weight:700; font-family:'Space Mono',monospace; }
  .badge-green { background:rgba(34,197,94,.1); color:var(--green); }
  .badge-amber { background:rgba(245,158,11,.1); color:var(--accent3); }
  .badge-red { background:rgba(239,68,68,.1); color:var(--danger); }
  .badge-blue { background:rgba(43,108,176,.1); color:var(--accent2); }
  .chart-card { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:18px; margin-bottom:16px; }
  .chart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .chart-header h3 { font-size:.9rem; font-weight:600; }
  .chart-legend { display:flex; gap:12px; }
  .legend-item { display:flex; align-items:center; gap:5px; font-size:.68rem; color:var(--muted); }
  .legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .chart-wrap { position:relative; height:160px; }
  .chart-wrap svg { width:100%; height:100%; overflow:visible; }
  .chart-labels { display:flex; justify-content:space-between; margin-top:6px; }
  .chart-labels span { font-size:.62rem; color:var(--muted); font-family:'Space Mono',monospace; }
  .heatmap-card { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:18px; margin-bottom:16px; }
  .heatmap-card h3 { font-size:.9rem; font-weight:600; margin-bottom:14px; }
  .heatmap-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
  .heatmap-cell { aspect-ratio:1; border-radius:4px; }
  .hm-0 { background:var(--surface2); }
  .hm-1 { background:rgba(13,148,136,.2); }
  .hm-2 { background:rgba(13,148,136,.5); }
  .hm-3 { background:var(--accent); }
  .hm-rest { background:rgba(107,122,153,.08); }
  .heatmap-legend { display:flex; align-items:center; gap:6px; margin-top:10px; font-size:.65rem; color:var(--muted); }
  .heatmap-legend-dots { display:flex; gap:3px; }
  .heatmap-legend-dot { width:10px; height:10px; border-radius:2px; }
  .projection-card { background:linear-gradient(135deg, rgba(43,108,176,.06), rgba(13,148,136,.04)); border:1px solid rgba(43,108,176,.18); border-radius:18px; padding:18px; margin-bottom:16px; }
  .projection-card h3 { font-size:.9rem; font-weight:600; margin-bottom:14px; }
  .proj-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
  .proj-row:last-child { border-bottom:none; }
  .proj-label { font-size:.82rem; color:var(--muted); }
  .proj-val { font-family:'Space Mono',monospace; font-size:.88rem; font-weight:700; }
  .proj-val.green { color:var(--accent); }
  .proj-val.amber { color:var(--accent3); }
  .proj-val.blue { color:var(--accent2); }
  .weekly-card { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:18px; margin-bottom:16px; }
  .weekly-card h3 { font-size:.9rem; font-weight:600; margin-bottom:14px; }
  .weekly-bars { display:flex; gap:8px; align-items:flex-end; height:80px; }
  .weekly-bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; }
  .weekly-bar-bg { flex:1; width:100%; background:var(--surface2); border-radius:4px; position:relative; overflow:hidden; }
  .weekly-bar-fill { position:absolute; bottom:0; left:0; right:0; border-radius:4px; transition:height .5s ease; }
  .weekly-bar-label { font-size:.6rem; color:var(--muted); font-family:'Space Mono',monospace; }
  .weekly-bar-pct { font-size:.6rem; color:var(--muted); }
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  .stat-box { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px; }
  .stat-box-label { font-size:.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:6px; }
  .stat-box-val { font-family:'Space Mono',monospace; font-size:1.4rem; font-weight:700; line-height:1; margin-bottom:4px; }
  .stat-box-sub { font-size:.7rem; color:var(--muted); }
  .stat-box-trend { font-size:.72rem; margin-top:4px; font-weight:600; }
  .trend-up { color:var(--green); }
  .trend-down { color:var(--danger); }
  .trend-neutral { color:var(--muted); }
  .empty-state { text-align:center; padding:48px 20px; color:var(--muted); }
  .empty-state span { font-size:2.5rem; display:block; margin-bottom:12px; }
  .empty-state p { font-size:.88rem; line-height:1.6; margin-bottom:20px; }
  .empty-btn { background:var(--accent); color:#fff; border:none; padding:12px 24px; border-radius:10px; font-family:inherit; font-size:.88rem; font-weight:700; cursor:pointer; }
  .loading-state { text-align:center; padding:60px 20px; color:var(--muted); font-size:.88rem; }
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:200; background:rgba(255,255,255,.97); backdrop-filter:blur(16px); border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-around; height:var(--nav-h); padding:0 8px; }
  .nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 10px; border-radius:12px; cursor:pointer; text-decoration:none; color:var(--muted); transition:all .2s; min-width:48px; }
  .nav-item.active { color:var(--accent); }
  .nav-icon { font-size:1.2rem; line-height:1; }
  .nav-label { font-size:.55rem; font-weight:600; letter-spacing:.5px; text-transform:uppercase; }
  .nav-dot { width:4px; height:4px; background:var(--accent); border-radius:50%; margin-top:2px; }
  .section-label { font-size:.7rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); font-family:'Space Mono',monospace; margin-bottom:10px; margin-top:4px; }
  .legal-disclaimer { display:flex; align-items:flex-start; gap:8px; background:#FEF3C7; border:1px solid #F59E0B; border-radius:10px; padding:10px 14px; margin:12px 20px; }
  .legal-disclaimer-text { font-size:.72rem; color:#92400E; line-height:1.5; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL     = 'https://dkwztwlkjewdzfichkgk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrd3p0d2xramV3ZHpmaWNoa2drIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MjYwOTAsImV4cCI6MjA5NzQwMjA5MH0.iT7ylcNvPCf2jMUYfJlsDJcoGjPolphQWONFusAAlAk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const todayStr = (() => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();

let _cures = [], _weights = [], _injections = [], _userId = null;

// ── LOAD DATA FROM SUPABASE ───────────────────────────────────
async function loadData() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '/login.html'; return; }
  _userId = session.user.id;

  // Charger langue
  const { data: profil } = await sb.from('profiles').select('lang').eq('id', _userId).single();
  if (profil?.lang) PS_loadLangFromProfile(sb, _userId, profil.lang);

  const period = parseInt(document.getElementById('periodSelect').value) || 0;
  const cutoff = period > 0 ? new Date(TODAY.getTime() - period * 86400000).toISOString().split('T')[0] : null;

  // Cures
  const { data: cures } = await sb.from('cures').select('*').eq('user_id', _userId).eq('status', 'active');
  _cures = cures || [];

  // Poids
  let wQuery = sb.from('weight_logs').select('*').eq('user_id', _userId).order('logged_at');
  if (cutoff) wQuery = wQuery.gte('logged_at', cutoff);
  const { data: weights } = await wQuery;
  _weights = (weights || []).map(w => ({ ...w, date: w.logged_at }));

  // Injections (cure active uniquement)
  const activeCure = getActiveCure();
  if (activeCure) {
    let iQuery = sb.from('injections').select('*').eq('user_id', _userId).eq('cure_id', activeCure.id).order('injected_at');
    if (cutoff) iQuery = iQuery.gte('injected_at', cutoff);
    const { data: inj } = await iQuery;
    _injections = (inj || []).map(i => ({ ...i, date: i.injected_at?.split('T')[0] }));
  } else {
    _injections = [];
  }
}

function getActiveCure() {
  return _cures.find(c => {
    const s = new Date(c.start_date); s.setHours(0,0,0,0);
    const e = new Date(c.start_date); e.setDate(e.getDate() + (c.duration_days || 30)); e.setHours(0,0,0,0);
    return s <= TODAY && e >= TODAY;
  });
}

function getData() {
  const activeCure = getActiveCure();
  return { cures: _cures, weights: _weights, activeCure, logs: _injections };
}

// ── MOTEUR DE CORRÉLATION ──────────────────────────────────────
function computeCorrelations(data) {
  const { activeCure, logs, weights } = data;
  const insights = [];

  if (!activeCure && weights.length < 2) {
    return { insights: [], score: 0, scoreBreakdown: { compliance: 0, progression: 0, regularity: 0 } };
  }

  let complianceScore = 0, compliancePct = 0;
  if (activeCure) {
    const freq = parseFloat(activeCure.frequency) || 1;
    const startD = new Date(activeCure.start_date); startD.setHours(0,0,0,0);
    const dayNum = Math.max(1, Math.floor((TODAY - startD) / 86400000) + 1);
    const totalExpected = Math.round(Math.min(dayNum, activeCure.duration_days || 30) * freq);
    const done = logs.length;
    compliancePct = totalExpected > 0 ? Math.min(100, Math.round(done / totalExpected * 100)) : 0;
    complianceScore = compliancePct;

    if (compliancePct >= 90) {
      insights.push({ type:'positive', icon:'🎯',
        title: t('analytics_compliance_excellent') + ` — ${compliancePct}%`,
        text: `${done} / ${totalExpected} ${t('analytics_expected')}`,
        badge: { text: `+${compliancePct}%`, cls:'badge-green' }
      });
    } else if (compliancePct >= 70) {
      insights.push({ type:'warning', icon:'⚠️',
        title: t('analytics_compliance_good') + ` — ${compliancePct}%`,
        text: `${totalExpected - done} ${t('analytics_missed_inj')}`,
        badge: { text: compliancePct+'%', cls:'badge-amber' }
      });
    } else {
      insights.push({ type:'negative', icon:'❌',
        title: t('analytics_compliance_weak') + ` — ${compliancePct}%`,
        text: `${totalExpected - done} ${t('analytics_missed_inj')}`,
        badge: { text: compliancePct+'%', cls:'badge-red' }
      });
    }

    // Weekend analysis
    const weekendLogs = logs.filter(l => { const d=new Date(l.date); return d.getDay()===0||d.getDay()===6; });
    const weekdayLogs = logs.filter(l => { const d=new Date(l.date); return d.getDay()!==0&&d.getDay()!==6; });
    const totalDays = Math.min(dayNum, activeCure.duration_days || 30);
    const weekendDays = Math.round(totalDays * 2/7);
    const weekdayDays = totalDays - weekendDays;
    const weekendRate = weekendDays > 0 ? weekendLogs.length / (weekendDays * freq) : 1;
    const weekdayRate = weekdayDays > 0 ? weekdayLogs.length / (weekdayDays * freq) : 1;
    if (weekendRate < weekdayRate * 0.7 && weekendDays >= 2) {
      insights.push({ type:'warning', icon:'📅',
        title: t('analytics_weekend_drop'),
        text: t('analytics_weekend_text').replace('{pct}', Math.round((1-weekendRate/weekdayRate)*100)),
        badge: { text: t('analytics_weekend')+' -'+Math.round((1-weekendRate/weekdayRate)*100)+'%', cls:'badge-amber' }
      });
    }
  }

  let progressionScore = 50;
  if (weights.length >= 2) {
    const first = weights[0];
    const last = weights[weights.length-1];
    const firstKg = parseFloat(first.weight_kg || first.kg);
    const lastKg = parseFloat(last.weight_kg || last.kg);
    const diffKg = lastKg - firstKg;
    const diffPct = Math.abs(diffKg / firstKg * 100).toFixed(1);
    const days = Math.ceil((new Date(last.date) - new Date(first.date)) / 86400000);
    const ratePerWeek = days > 0 ? (diffKg / days * 7).toFixed(2) : 0;

    if (activeCure && days >= 5) {
      const cureStart = new Date(activeCure.start_date);
      const weightsSinceCure = weights.filter(w => new Date(w.date) >= cureStart);
      if (weightsSinceCure.length >= 2) {
        const firstCureW = parseFloat(weightsSinceCure[0].weight_kg || weightsSinceCure[0].kg);
        const lastCureW = parseFloat(weightsSinceCure[weightsSinceCure.length-1].weight_kg || weightsSinceCure[weightsSinceCure.length-1].kg);
        const cureDiff = lastCureW - firstCureW;
        const cureDays = Math.ceil((new Date(weightsSinceCure[weightsSinceCure.length-1].date) - cureStart) / 86400000);
        insights.push({ type: cureDiff < 0 ? 'positive' : 'info', icon:'⚖️',
          title: `${t('analytics_since')} ${activeCure.peptide_name || activeCure.name} — ${cureDiff > 0?'+':''}${cureDiff.toFixed(1)} kg`,
          text: `${cureDays} ${t('analytics_cure_days_weight')} ${cureDiff < 0 ? t('analytics_lost') : t('analytics_gained')} ${Math.abs(cureDiff).toFixed(1)} kg. ${t('analytics_pace')} : ${Math.abs(ratePerWeek)} kg/${t('week')}.`,
          badge: { text: (cureDiff>0?'+':'')+cureDiff.toFixed(1)+' kg', cls: cureDiff<0?'badge-green':'badge-blue' }
        });
        progressionScore = cureDiff <= 0 ? 80 : 50;
      }
    } else if (weights.length >= 2) {
      insights.push({ type: diffKg < 0 ? 'positive' : 'info', icon:'📉',
        title: `${t('analytics_weight_evolution')} — ${diffKg>0?'+':''}${diffKg.toFixed(1)} kg`,
        text: `${t('analytics_over')} ${days} ${t('days')}, ${diffKg < 0 ? t('analytics_you_lost') : t('analytics_you_gained')} ${Math.abs(diffKg).toFixed(1)} kg (${diffPct}%). ${t('analytics_pace')} : ${Math.abs(ratePerWeek)} kg/${t('week')}.`,
        badge: { text: (diffKg>0?'+':'')+diffKg.toFixed(1)+' kg', cls: diffKg<0?'badge-green':'badge-amber' }
      });
    }
  }

  let regularityScore = 0;
  if (weights.length >= 3) {
    const gaps = [];
    for (let i=1; i<weights.length; i++) gaps.push((new Date(weights[i].date) - new Date(weights[i-1].date)) / 86400000);
    const avgGap = gaps.reduce((a,b)=>a+b,0) / gaps.length;
    const maxGap = Math.max(...gaps);
    regularityScore = Math.max(0, 100 - avgGap * 5);
    if (maxGap > 14) {
      insights.push({ type:'warning', icon:'⏳',
        title: t('analytics_gap').replace('{n}', Math.round(maxGap)),
        text: t('analytics_gap_text').replace('{n}', Math.round(maxGap)),
        badge: { text: Math.round(maxGap)+' '+t('days'), cls:'badge-amber' }
      });
    } else {
      regularityScore = 90;
      insights.push({ type:'positive', icon:'✅',
        title: t('analytics_regular_weighing'),
        text: `${t('analytics_avg_gap')} ${avgGap.toFixed(1)} ${t('days')}.`,
        badge: { text: t('analytics_regular'), cls:'badge-green' }
      });
    }
  } else if (weights.length > 0) {
    regularityScore = 30;
    insights.push({ type:'info', icon:'💡',
      title: t('analytics_add_weighing'),
      text: `${weights.length} ${t('weight_measures')}. ${t('analytics_add_weighing_text')}`,
      badge: { text: weights.length+' '+t('weight_measures'), cls:'badge-blue' }
    });
  }

  const scoreBreakdown = {
    compliance: Math.round(complianceScore),
    progression: Math.round(progressionScore),
    regularity: Math.round(regularityScore)
  };
  const globalScore = Math.round(complianceScore * 0.4 + progressionScore * 0.35 + regularityScore * 0.25);
  return { insights, score: globalScore, scoreBreakdown };
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const data = getData();
  const { insights, score, scoreBreakdown } = computeCorrelations(data);
  const c = document.getElementById('mainContent');
  const locale = PS_getLang() === 'en' ? 'en-US' : 'fr-FR';

  if (data.weights.length === 0 && !data.activeCure) {
    c.innerHTML = `<div class="empty-state">
      <span>📊</span>
      <p>${t('analytics_empty_text')}</p>
      <button class="empty-btn" onclick="window.location.href='cure.html'">${t('analytics_start_cure')}</button>
    </div>`;
    return;
  }

  const scoreColor = score >= 80 ? 'var(--accent)' : score >= 60 ? 'var(--accent3)' : 'var(--danger)';
  const scoreLabel = score >= 80 ? t('analytics_excellent') : score >= 60 ? t('analytics_good') : score >= 40 ? t('analytics_improve') : t('analytics_weak');
  const circumference = 2 * Math.PI * 30;
  const offset = circumference * (1 - score / 100);

  c.innerHTML = `
    <div class="scan-score-card">
      <div class="score-header">
        <div>
          <div class="score-label">${t('analytics_scan_score')}</div>
          <div class="score-title">${t('analytics_protocol_analysis')}</div>
        </div>
        <div class="score-ring-wrap">
          <svg viewBox="0 0 68 68" width="68" height="68">
            <circle class="score-ring-bg" cx="34" cy="34" r="30"/>
            <circle class="score-ring-fill" cx="34" cy="34" r="30"
              stroke="${scoreColor}"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${offset}"/>
          </svg>
          <div class="score-number">
            <span class="score-num" style="color:${scoreColor}">${score}</span>
            <span class="score-max">/100</span>
          </div>
        </div>
      </div>
      <div class="score-breakdown">
        <div class="score-item">
          <div class="score-item-val" style="color:${scoreBreakdown.compliance>=70?'var(--accent)':'var(--accent3)'}">${scoreBreakdown.compliance}%</div>
          <div class="score-item-label">${t('cure_compliance')}</div>
        </div>
        <div class="score-item">
          <div class="score-item-val" style="color:${scoreBreakdown.progression>=60?'var(--accent)':'var(--accent3)'}">${scoreBreakdown.progression}%</div>
          <div class="score-item-label">${t('analytics_progression')}</div>
        </div>
        <div class="score-item">
          <div class="score-item-val" style="color:${scoreBreakdown.regularity>=60?'var(--accent)':'var(--accent3)'}">${scoreBreakdown.regularity}%</div>
          <div class="score-item-label">${t('analytics_regularity')}</div>
        </div>
      </div>
    </div>

    <div class="stats-grid">${renderStatBox(data)}</div>

    <div class="section-label">${t('analytics_insights')}</div>
    <div class="insights-wrap">
      ${insights.length > 0
        ? insights.map(ins => `
          <div class="insight-card ${ins.type}">
            <div class="insight-icon">${ins.icon}</div>
            <div class="insight-body">
              <div class="insight-title">${ins.title}</div>
              <div class="insight-text">${ins.text}</div>
              ${ins.badge ? `<span class="insight-badge ${ins.badge.cls}">${ins.badge.text}</span>` : ''}
            </div>
          </div>`).join('')
        : `<div style="text-align:center;padding:20px;color:var(--muted);font-size:.85rem">${t('analytics_no_data')}</div>`
      }
    </div>

    ${data.weights.length >= 2 ? renderCorrelationChart(data, locale) : ''}
    ${data.activeCure ? renderHeatmap(data) : ''}
    ${data.activeCure && data.logs.length > 0 ? renderWeeklyBars(data) : ''}
    ${renderProjection(data, locale)}
  `;
}

function renderStatBox(data) {
  const { activeCure, logs, weights } = data;
  const stats = [];
  if (activeCure) {
    const freq = parseFloat(activeCure.frequency) || 1;
    const startD = new Date(activeCure.start_date); startD.setHours(0,0,0,0);
    const dayNum = Math.max(1, Math.floor((TODAY - startD) / 86400000) + 1);
    const expected = Math.round(Math.min(dayNum, activeCure.duration_days || 30) * freq);
    const pct = expected > 0 ? Math.min(100, Math.round(logs.length / expected * 100)) : 0;
    stats.push(`<div class="stat-box"><div class="stat-box-label">${t('profil_injections')}</div><div class="stat-box-val" style="color:var(--accent)">${logs.length}</div><div class="stat-box-sub">/ ${expected} ${t('analytics_expected')}</div><div class="stat-box-trend ${pct>=80?'trend-up':pct>=60?'trend-neutral':'trend-down'}">${pct}% ${t('cure_compliance').toLowerCase()}</div></div>`);
    stats.push(`<div class="stat-box"><div class="stat-box-label">${t('analytics_cure_day')}</div><div class="stat-box-val" style="color:var(--accent2)">J${Math.min(dayNum, activeCure.duration_days||30)}</div><div class="stat-box-sub">/ ${activeCure.duration_days||30} ${t('days')}</div><div class="stat-box-trend trend-neutral">${Math.max(0,(activeCure.duration_days||30)-dayNum)} ${t('cure_remaining').toLowerCase()}</div></div>`);
  }
  if (weights.length >= 2) {
    const first = parseFloat(weights[0].weight_kg || weights[0].kg);
    const last = parseFloat(weights[weights.length-1].weight_kg || weights[weights.length-1].kg);
    const diff = (last - first).toFixed(1);
    stats.push(`<div class="stat-box"><div class="stat-box-label">${t('dash_current_weight')}</div><div class="stat-box-val" style="color:var(--accent)">${last} kg</div><div class="stat-box-sub">${weights.length} ${t('weight_measures')}</div><div class="stat-box-trend ${diff<=0?'trend-up':'trend-down'}">${diff>0?'+':''}${diff} kg</div></div>`);
    const days = Math.ceil((new Date(weights[weights.length-1].date) - new Date(weights[0].date)) / 86400000);
    const rate = days > 0 ? Math.abs((last-first)/days*7).toFixed(2) : 0;
    stats.push(`<div class="stat-box"><div class="stat-box-label">${t('analytics_pace')}</div><div class="stat-box-val" style="color:var(--accent3)">${rate}</div><div class="stat-box-sub">${t('analytics_kg_week')}</div><div class="stat-box-trend trend-neutral">${t('analytics_over')} ${days} ${t('days')}</div></div>`);
  }
  return stats.join('');
}

function renderCorrelationChart(data, locale) {
  const { weights, activeCure } = data;
  if (weights.length < 2) return '';
  const W=400,H=120,PL=28,PR=8,PT=8,PB=16;
  const vals = weights.map(w => parseFloat(w.weight_kg || w.kg));
  const mn = Math.min(...vals)-0.5, mx = Math.max(...vals)+0.5;
  const pts = vals.map((v,i) => ({ x:PL+(i/(vals.length-1))*(W-PL-PR), y:PT+(1-(v-mn)/(mx-mn))*(H-PT-PB), kg:v, date:weights[i].date }));
  const line = pts.map((p,i)=>i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`).join(' ');
  const area = line+` L${pts[pts.length-1].x},${H-PB} L${PL},${H-PB} Z`;
  let cureStartLine = '';
  if (activeCure) {
    const cureStart = new Date(activeCure.start_date);
    const cureIdx = weights.findIndex(w => new Date(w.date) >= cureStart);
    if (cureIdx > 0 && cureIdx < weights.length) {
      const cx = pts[cureIdx].x;
      cureStartLine = `<line x1="${cx}" y1="${PT}" x2="${cx}" y2="${H-PB}" stroke="rgba(99,102,241,.4)" stroke-width="1.5" stroke-dasharray="3,3"/>`;
    }
  }
  const step = Math.max(1, Math.floor(weights.length/4));
  const xLabels = pts.filter((_,i)=>i%step===0||i===pts.length-1).map(p=>`<span>${new Date(p.date).toLocaleDateString(locale,{day:'2-digit',month:'short'})}</span>`).join('');
  const n=pts.length, sumX=pts.reduce((s,_,i)=>s+i,0), sumY=pts.reduce((s,p)=>s+p.y,0), sumXY=pts.reduce((s,p,i)=>s+i*p.y,0), sumX2=pts.reduce((s,_,i)=>s+i*i,0);
  const slope=(n*sumXY-sumX*sumY)/(n*sumX2-sumX*sumX), intercept=(sumY-slope*sumX)/n;
  const trendColor = slope<0?'var(--accent)':'var(--danger)';
  return `
    <div class="section-label">${t('analytics_correlation')}</div>
    <div class="chart-card">
      <div class="chart-header">
        <h3>${t('dash_weight_title')}</h3>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>${t('weight_current')}</div>
          <div class="legend-item"><div class="legend-dot" style="background:${trendColor};opacity:.7"></div>${t('analytics_trend')}</div>
        </div>
      </div>
      <div class="chart-wrap">
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;overflow:visible">
          <defs><linearGradient id="cGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00C9A7" stop-opacity=".2"/><stop offset="100%" stop-color="#00C9A7" stop-opacity="0"/></linearGradient></defs>
          <line x1="${PL}" y1="${PT}" x2="${W-PR}" y2="${PT}" stroke="var(--border)" stroke-width="1"/>
          <line x1="${PL}" y1="${(H-PB+PT)/2}" x2="${W-PR}" y2="${(H-PB+PT)/2}" stroke="var(--border)" stroke-width="1"/>
          <line x1="${PL}" y1="${H-PB}" x2="${W-PR}" y2="${H-PB}" stroke="var(--border)" stroke-width="1"/>
          <text x="${PL-3}" y="${PT+4}" fill="var(--muted)" font-size="8" text-anchor="end" font-family="Space Mono">${mx.toFixed(1)}</text>
          <text x="${PL-3}" y="${(H-PB+PT)/2+4}" fill="var(--muted)" font-size="8" text-anchor="end" font-family="Space Mono">${((mx+mn)/2).toFixed(1)}</text>
          <text x="${PL-3}" y="${H-PB+4}" fill="var(--muted)" font-size="8" text-anchor="end" font-family="Space Mono">${mn.toFixed(1)}</text>
          <path d="${area}" fill="url(#cGrad)"/>
          <line x1="${pts[0].x}" y1="${intercept}" x2="${pts[n-1].x}" y2="${slope*(n-1)+intercept}" stroke="${trendColor}" stroke-width="1.5" stroke-dasharray="4,3" opacity=".6"/>
          ${cureStartLine}
          <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="var(--accent)"/>`).join('')}
          <circle cx="${pts[pts.length-1].x}" cy="${pts[pts.length-1].y}" r="5" fill="var(--accent)" stroke="var(--bg)" stroke-width="2"/>
        </svg>
      </div>
      <div class="chart-labels">${xLabels}</div>
    </div>`;
}

function renderHeatmap(data) {
  const { activeCure, logs } = data;
  if (!activeCure) return '';
  const startD = new Date(activeCure.start_date); startD.setHours(0,0,0,0);
  const freq = parseFloat(activeCure.frequency) || 1;
  const inj_per_day = freq >= 1 ? Math.ceil(freq) : 1;
  const dayNum = Math.floor((TODAY - startD) / 86400000) + 1;
  const displayDays = Math.min(dayNum, activeCure.duration_days || 30, 28);
  let cells = '';
  for (let i=0; i<displayDays; i++) {
    const d = new Date(startD); d.setDate(d.getDate()+i);
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const done = logs.filter(l => l.date === ds).length;
    let cls = freq < 1 ? (i%Math.round(1/freq)===0 ? (done>0?'hm-3':'hm-0') : 'hm-rest') : (done>=inj_per_day?'hm-3':done>0?'hm-2':d<TODAY?'hm-0':'hm-rest');
    cells += `<div class="heatmap-cell ${cls}" style="${ds===todayStr?'outline:2px solid var(--accent);outline-offset:1px':''}"></div>`;
  }
  return `
    <div class="section-label">${t('analytics_heatmap')}</div>
    <div class="heatmap-card">
      <h3>${activeCure.peptide_name || activeCure.name} — ${displayDays} ${t('analytics_last_days')}</h3>
      <div class="heatmap-grid">${cells}</div>
      <div class="heatmap-legend">
        <span>${t('analytics_less')}</span>
        <div class="heatmap-legend-dots">
          <div class="heatmap-legend-dot hm-0"></div><div class="heatmap-legend-dot hm-1"></div><div class="heatmap-legend-dot hm-2"></div><div class="heatmap-legend-dot hm-3"></div>
        </div>
        <span>${t('analytics_more')}</span>
      </div>
    </div>`;
}

function renderWeeklyBars(data) {
  const { activeCure, logs } = data;
  if (!activeCure || logs.length === 0) return '';
  const startD = new Date(activeCure.start_date); startD.setHours(0,0,0,0);
  const freq = parseFloat(activeCure.frequency) || 1;
  const weeks = [];
  for (let w=0; w<6; w++) {
    const ws = new Date(startD); ws.setDate(ws.getDate()+w*7);
    const we = new Date(ws); we.setDate(we.getDate()+6);
    if (ws > TODAY) break;
    const daysInWeek = Math.min(7, Math.ceil((TODAY - ws) / 86400000));
    const expectedInj = Math.round(daysInWeek * freq);
    const doneInj = logs.filter(l => { const d=new Date(l.date); return d>=ws&&d<=we; }).length;
    const pct = expectedInj > 0 ? Math.min(100, Math.round(doneInj/expectedInj*100)) : 0;
    weeks.push({ label:`S${w+1}`, pct, done:doneInj, expected:expectedInj });
  }
  if (weeks.length === 0) return '';
  const barsHtml = weeks.map(w => {
    const color = w.pct>=90?'var(--accent)':w.pct>=70?'var(--accent3)':'var(--danger)';
    return `<div class="weekly-bar-wrap"><div class="weekly-bar-pct">${w.pct}%</div><div class="weekly-bar-bg"><div class="weekly-bar-fill" style="height:${w.pct}%;background:${color}"></div></div><div class="weekly-bar-label">${w.label}</div></div>`;
  }).join('');
  return `
    <div class="section-label">${t('analytics_weekly_compliance')}</div>
    <div class="weekly-card">
      <h3>${t('analytics_regularity')} — ${activeCure.peptide_name || activeCure.name}</h3>
      <div class="weekly-bars">${barsHtml}</div>
    </div>`;
}

function renderProjection(data, locale) {
  const { activeCure, logs, weights } = data;
  if (!activeCure) return '';
  const startD = new Date(activeCure.start_date); startD.setHours(0,0,0,0);
  const dayNum = Math.floor((TODAY - startD) / 86400000) + 1;
  const daysLeft = Math.max(0, (activeCure.duration_days||30) - dayNum);
  const endDate = new Date(startD); endDate.setDate(endDate.getDate() + (activeCure.duration_days||30));
  const freq = parseFloat(activeCure.frequency) || 1;
  const totalExpected = Math.round((activeCure.duration_days||30) * freq);
  const done = logs.length;
  const remaining = Math.max(0, totalExpected - done);
  let weightProjection = '—', weightDiff = '—';
  if (weights.length >= 2) {
    const cureWeights = weights.filter(w => new Date(w.date) >= startD);
    if (cureWeights.length >= 2) {
      const firstW = parseFloat(cureWeights[0].weight_kg || cureWeights[0].kg);
      const lastW = parseFloat(cureWeights[cureWeights.length-1].weight_kg || cureWeights[cureWeights.length-1].kg);
      const days = Math.ceil((new Date(cureWeights[cureWeights.length-1].date) - startD) / 86400000);
      const ratePerDay = days > 0 ? (lastW - firstW) / days : 0;
      const proj = (lastW + ratePerDay * daysLeft).toFixed(1);
      weightProjection = proj + ' kg';
      weightDiff = ((parseFloat(proj)-firstW)>0?'+':'')+(parseFloat(proj)-firstW).toFixed(1)+' kg';
    }
  }
  const projCompliance = totalExpected > 0 ? Math.min(100, Math.round((done + remaining * 0.85) / totalExpected * 100)) : 0;
  return `
    <div class="section-label">${t('analytics_weight_proj')}</div>
    <div class="projection-card">
      <h3>🔮 ${t('analytics_cure_end')} — ${endDate.toLocaleDateString(locale,{day:'2-digit',month:'long'})}</h3>
      <div class="proj-row"><span class="proj-label">${t('dash_days_left')}</span><span class="proj-val ${daysLeft<=7?'amber':'green'}">${daysLeft} ${t('days')}</span></div>
      <div class="proj-row"><span class="proj-label">${t('analytics_remaining_inj')}</span><span class="proj-val blue">${remaining}</span></div>
      <div class="proj-row"><span class="proj-label">${t('analytics_projected_weight')}</span><span class="proj-val green">${weightProjection}</span></div>
      <div class="proj-row"><span class="proj-label">${t('analytics_projected_diff')}</span><span class="proj-val ${weightDiff.includes('-')?'green':'amber'}">${weightDiff}</span></div>
      <div class="proj-row"><span class="proj-label">${t('analytics_projected_compliance')}</span><span class="proj-val ${projCompliance>=80?'green':'amber'}">${projCompliance}%</span></div>
    </div>`;
}

// ── INIT ─────────────────────────────────────────────────────
async function init() {
  await loadData();
  render();
  PS_applyI18n();
  PS_renderLangSwitcher();
}

init().catch(console.error);
</script>
